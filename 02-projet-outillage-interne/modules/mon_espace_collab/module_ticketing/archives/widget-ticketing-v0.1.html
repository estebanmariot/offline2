<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet"/>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#F4F5F7;height:100vh;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}

/* Header */
.hdr{background:#fff;border-bottom:1px solid #E5E7EB;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-left{}
.hdr-title{font-family:'Press Start 2P';font-size:9px;color:#43D19B;letter-spacing:.05em;}
.hdr-name{font-size:12px;color:#6B7280;margin-top:2px;}
.hdr-right{display:flex;align-items:center;gap:8px;}

/* Corps */
.body{flex:1;overflow-y:auto;padding:14px 16px;}

/* Barre filtres */
.filters{background:#fff;border-bottom:1px solid #E5E7EB;padding:8px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.search-input{border:1px solid #E5E7EB;border-radius:6px;padding:5px 10px;font-size:12px;font-family:'Inter';flex:1;min-width:140px;}
.search-input:focus{outline:none;border-color:#43D19B;}
.filter-sel{border:1px solid #E5E7EB;border-radius:6px;padding:5px 8px;font-size:12px;font-family:'Inter';background:#fff;color:#1A1A1A;}
.filter-sel:focus{outline:none;border-color:#43D19B;}

/* Boutons */
.btn{padding:7px 14px;border-radius:4px;font-family:'Press Start 2P';font-size:8px;cursor:pointer;border:2px solid #000;box-shadow:3px 3px 0 #000;transition:all .08s;background:#fff;color:#1A1A1A;}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}
.btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}
.btn-primary{background:#43D19B;color:#fff;}
.btn-danger{background:#EF4444;color:#fff;}
.btn-sm{padding:5px 10px;font-size:7px;}

/* Liste tickets */
.ticket-item{background:#fff;border:1px solid #E5E7EB;border-radius:6px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.ticket-item:hover{border-color:#43D19B;}
.ticket-item-left{flex:1;min-width:0;}
.ticket-titre{font-size:13px;font-weight:500;color:#1A1A1A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ticket-meta{font-size:11px;color:#6B7280;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;}
.ticket-item-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.chevron{color:#43D19B;font-size:16px;}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;}
.badge-ouvert{background:#F3F4F6;color:#6B7280;}
.badge-en_cours{background:#EDE9FE;color:#4C1D95;}
.badge-pending{background:#FEF3C7;color:#92400E;}
.badge-resolu{background:#DBEAFE;color:#1E3A8A;}
.badge-a_valider{background:#FEF3C7;color:#92400E;}
.badge-ferme{background:#D1FAE5;color:#065F46;}
.badge-basse{background:#F3F4F6;color:#6B7280;}
.badge-moyenne{background:#DBEAFE;color:#1E3A8A;}
.badge-haute{background:#FEF3C7;color:#92400E;}
.badge-tres_haute{background:#FEE2E2;color:#991B1B;}

/* Empty / loading */
.empty{text-align:center;padding:40px;color:#9CA3AF;font-size:13px;}
.loading{font-family:'Press Start 2P';font-size:10px;color:#6B7280;padding:60px;text-align:center;}
.blink{animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}

/* Toast */
.toast{position:fixed;bottom:16px;right:16px;padding:9px 14px;border-radius:6px;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.toast-ok{background:#43D19B;color:#fff;}
.toast-err{background:#EF4444;color:#fff;}

/* Modale */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#fff;border-radius:8px;width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal-hdr{padding:14px 16px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-title{font-family:'Press Start 2P';font-size:8px;color:#43D19B;}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#6B7280;line-height:1;}
.modal-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;}
.modal-footer{padding:10px 16px;border-top:1px solid #E5E7EB;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}

/* Formulaire */
.field-label{font-size:11px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.field-input{width:100%;border:1px solid #D1D5DB;border-radius:6px;padding:7px 9px;font-family:'Inter';font-size:12px;}
.field-input:focus{outline:none;border-color:#43D19B;}
.field-select{width:100%;border:1px solid #D1D5DB;border-radius:6px;padding:7px 9px;font-family:'Inter';font-size:12px;background:#fff;}
.field-select:focus{outline:none;border-color:#43D19B;}
textarea.field-input{resize:vertical;min-height:80px;}

/* Détail ticket */
.detail-section{margin-bottom:14px;}
.detail-label{font-size:11px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.detail-value{font-size:13px;color:#1A1A1A;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Commentaires */
.comment-item{border:1px solid #E5E7EB;border-radius:6px;padding:10px 12px;margin-bottom:8px;}
.comment-meta{font-size:11px;color:#9CA3AF;margin-bottom:4px;}
.comment-contenu{font-size:12px;color:#1A1A1A;}

/* Section titre */
.section-title{font-size:11px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}

/* Encart info */
.encart{background:#F0FDF9;border:1px solid #A7F3D0;border-radius:6px;padding:9px 12px;font-size:12px;color:#065F46;margin-bottom:12px;}

/* Tabs admin */
.tabs{display:flex;border:1px solid #E5E7EB;border-radius:6px;overflow:hidden;margin-bottom:14px;}
.tab{padding:5px 14px;font-size:12px;color:#6B7280;background:#fff;cursor:pointer;border:none;}
.tab.active{background:#43D19B;color:#fff;font-weight:500;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Helpers ──
const STATUTS = ['OUVERT','EN_COURS','PENDING','RESOLU','A_VALIDER','FERME'];
const STATUT_LABELS = {OUVERT:'Ouvert',EN_COURS:'En cours',PENDING:'Pending',RESOLU:'Résolu',A_VALIDER:'À valider',FERME:'Fermé'};
const CRITICITES = ['BASSE','MOYENNE','HAUTE','TRES_HAUTE'];
const CRITICITE_LABELS = {BASSE:'Basse',MOYENNE:'Moyenne',HAUTE:'Haute',TRES_HAUTE:'Très haute'};

const fmt = (ts) => {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  return d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
};

const BadgeStatut = ({s}) => <span className={`badge badge-${(s||'').toLowerCase()}`}>{STATUT_LABELS[s]||s}</span>;
const BadgeCrit = ({c}) => <span className={`badge badge-${(c||'').toLowerCase()}`}>{CRITICITE_LABELS[c]||c}</span>;

// ── Toast ──
function Toast({toast}) {
  if (!toast) return null;
  return <div className={`toast toast-${toast.type}`}>{toast.msg}</div>;
}

// ── Modale Nouveau Ticket ──
function ModaleNouveauTicket({categories, onClose, onCreate}) {
  const [titre, setTitre] = useState('');
  const [desc, setDesc] = useState('');
  const [crit, setCrit] = useState('MOYENNE');
  const [catId, setCatId] = useState(categories[0]?.id || '');
  const [saving, setSaving] = useState(false);

  const submit = async () => {
    if (!titre.trim() || !catId) return;
    setSaving(true);
    await onCreate({titre: titre.trim(), description: desc.trim(), criticite: crit, categorie_id: Number(catId)});
    setSaving(false);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-hdr">
          <span className="modal-title">NOUVEAU TICKET</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div>
            <div className="field-label">Titre *</div>
            <input className="field-input" value={titre} onChange={e=>setTitre(e.target.value)} placeholder="Décrivez brièvement votre demande"/>
          </div>
          <div>
            <div className="field-label">Description</div>
            <textarea className="field-input" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Détails supplémentaires..."/>
          </div>
          <div className="detail-grid">
            <div>
              <div className="field-label">Catégorie *</div>
              <select className="field-select" value={catId} onChange={e=>setCatId(e.target.value)}>
                {categories.filter(c=>c.actif).map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
              </select>
            </div>
            <div>
              <div className="field-label">Criticité</div>
              <select className="field-select" value={crit} onChange={e=>setCrit(e.target.value)}>
                {CRITICITES.map(c=><option key={c} value={c}>{CRITICITE_LABELS[c]}</option>)}
              </select>
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-sm" onClick={onClose}>Annuler</button>
          <button className="btn btn-primary btn-sm" onClick={submit} disabled={saving||!titre.trim()||!catId}>
            {saving ? '...' : 'Créer'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Modale Détail Ticket ──
function ModaleDetail({ticket, categories, moi, estAgent, estAdmin, commentaires, onClose, onUpdate, onComment}) {
  const [statut, setStatut] = useState(ticket.statut);
  const [agentId, setAgentId] = useState(ticket.agent_assigne_id || '');
  const [catId, setCatId] = useState(ticket.categorie_id || '');
  const [newComment, setNewComment] = useState('');
  const [saving, setSaving] = useState(false);
  const [commenting, setCommenting] = useState(false);

  const estDemandeur = moi.id === ticket.demandeur_id;
  const peutModifierStatut = estAgent || estAdmin;
  const peutReaffecter = estAdmin || (() => {
    const cat = categories.find(c=>c.id===ticket.categorie_id);
    return cat && cat.responsable_id === moi.id;
  })();

  // Actions demandeur depuis A_VALIDER
  const actionDemandeur = estDemandeur && ticket.statut === 'A_VALIDER';

  const cat = categories.find(c=>c.id===ticket.categorie_id);
  const ticketComments = commentaires.filter(c=>c.ticket_id===ticket.id)
    .sort((a,b)=>(a.date||0)-(b.date||0));

  const saveStatut = async (nouveauStatut) => {
    setSaving(true);
    await onUpdate(ticket.id, {statut: nouveauStatut});
    setSaving(false);
    onClose();
  };

  const saveReaffectation = async () => {
    setSaving(true);
    const updates = {agent_assigne_id: Number(agentId)};
    if (Number(catId) !== ticket.categorie_id) {
      // Changement de catégorie → responsable de la nouvelle catégorie
      const newCat = categories.find(c=>c.id===Number(catId));
      if (newCat) updates.agent_assigne_id = newCat.responsable_id;
      updates.categorie_id = Number(catId);
    }
    await onUpdate(ticket.id, updates);
    setSaving(false);
    onClose();
  };

  const submitComment = async () => {
    if (!newComment.trim()) return;
    setCommenting(true);
    await onComment(ticket.id, newComment.trim());
    setNewComment('');
    setCommenting(false);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-hdr">
          <span className="modal-title">TICKET #{ticket.id}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">

          {/* Infos principales */}
          <div>
            <div style={{fontSize:14,fontWeight:600,color:'#1A1A1A',marginBottom:6}}>{ticket.titre}</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
              <BadgeStatut s={ticket.statut}/>
              <BadgeCrit c={ticket.criticite}/>
            </div>
            {ticket.description && <div style={{fontSize:12,color:'#6B7280',lineHeight:1.5}}>{ticket.description}</div>}
          </div>

          {/* Métadonnées */}
          <div className="detail-grid" style={{fontSize:12,color:'#6B7280'}}>
            <div><span style={{fontWeight:600}}>Catégorie :</span> {cat?.nom||'—'}</div>
            <div><span style={{fontWeight:600}}>Créé le :</span> {fmt(ticket.date_creation)}</div>
            <div><span style={{fontWeight:600}}>Agent assigné :</span> {ticket.agent_assigne_id||'—'}</div>
            <div><span style={{fontWeight:600}}>Mis à jour :</span> {fmt(ticket.date_maj)}</div>
          </div>

          {/* Action demandeur : A_VALIDER */}
          {actionDemandeur && (
            <div className="encart">
              Ce ticket est marqué comme résolu. Confirmez-vous la résolution ?
              <div style={{display:'flex',gap:8,marginTop:8}}>
                <button className="btn btn-primary btn-sm" disabled={saving} onClick={()=>saveStatut('FERME')}>Confirmer — fermé</button>
                <button className="btn btn-sm" disabled={saving} onClick={()=>saveStatut('EN_COURS')}>Rouvrir</button>
              </div>
            </div>
          )}

          {/* Changement statut (agents/admin) */}
          {peutModifierStatut && (
            <div>
              <div className="detail-label">Modifier le statut</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {STATUTS.filter(s=>s!==ticket.statut).map(s=>(
                  <button key={s} className="btn btn-sm" disabled={saving} onClick={()=>saveStatut(s)}>
                    → {STATUT_LABELS[s]}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Réaffectation */}
          {peutReaffecter && (
            <div>
              <div className="detail-label">Réaffecter</div>
              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                <select className="field-select" style={{flex:1}} value={catId} onChange={e=>{
                  setCatId(Number(e.target.value));
                  const nc = categories.find(c=>c.id===Number(e.target.value));
                  if(nc) setAgentId(nc.responsable_id);
                }}>
                  {categories.filter(c=>c.actif).map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
                </select>
                <button className="btn btn-sm" disabled={saving} onClick={saveReaffectation}>Réaffecter</button>
              </div>
            </div>
          )}

          {/* Commentaires */}
          <div>
            <div className="detail-label">Commentaires ({ticketComments.length})</div>
            {ticketComments.length===0 && <div style={{fontSize:12,color:'#9CA3AF',marginBottom:8}}>Aucun commentaire.</div>}
            {ticketComments.map(c=>(
              <div key={c.id} className="comment-item">
                <div className="comment-meta">{c.auteur_id} · {fmt(c.date)}</div>
                <div className="comment-contenu">{c.contenu}</div>
              </div>
            ))}
            <div style={{marginTop:8}}>
              <textarea className="field-input" style={{minHeight:60}} value={newComment}
                onChange={e=>setNewComment(e.target.value)} placeholder="Ajouter un commentaire..."/>
              <div style={{display:'flex',justifyContent:'flex-end',marginTop:6}}>
                <button className="btn btn-primary btn-sm" disabled={commenting||!newComment.trim()} onClick={submitComment}>
                  {commenting?'...':'Envoyer'}
                </button>
              </div>
            </div>
          </div>

        </div>
        <div className="modal-footer">
          <button className="btn btn-sm" onClick={onClose}>Fermer</button>
        </div>
      </div>
    </div>
  );
}

// ── Vue Admin : configuration catégories ──
function VueAdmin({categories, onClose}) {
  return (
    <div className="body">
      <div className="section-title">Configuration des catégories</div>
      {categories.map(c=>(
        <div key={c.id} className="ticket-item" style={{cursor:'default'}}>
          <div className="ticket-item-left">
            <div className="ticket-titre">{c.nom}</div>
            <div className="ticket-meta">
              <span>Responsable : {c.responsable_id||'—'}</span>
              {!c.actif && <span style={{color:'#EF4444'}}>● Inactive</span>}
            </div>
          </div>
        </div>
      ))}
      <div className="encart" style={{marginTop:12}}>
        La configuration des catégories et agents se gère directement dans les tables Grist (Tck_Categories).
      </div>
    </div>
  );
}

// ── App principale ──
function App() {
  const [moi, setMoi] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tickets, setTickets] = useState([]);
  const [categories, setCategories] = useState([]);
  const [commentaires, setCommentaires] = useState([]);
  const [toast, setToast] = useState(null);
  const [modale, setModale] = useState(null); // 'nouveau' | {ticket}
  const [onglet, setOnglet] = useState('mes-tickets'); // 'mes-tickets' | 'tous' | 'admin'
  const [filtreStatut, setFiltreStatut] = useState('');
  const [filtreCrit, setFiltreCrit] = useState('');
  const [recherche, setRecherche] = useState('');
  const toastTimer = useRef(null);

  const showToast = (type, msg) => {
    setToast({type, msg});
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(()=>setToast(null), 3000);
  };

  const charger = async (profil) => {
    try {
      const [tTickets, tCats, tComments] = await Promise.all([
        grist.docApi.fetchTable('Tck_Tickets'),
        grist.docApi.fetchTable('Tck_Categories'),
        grist.docApi.fetchTable('Tck_Commentaires'),
      ]);

      // Normalise fetchTable → tableau d'objets
      const toRows = (t) => {
        const keys = Object.keys(t);
        const len = t[keys[0]]?.length || 0;
        return Array.from({length:len}, (_,i) => Object.fromEntries(keys.map(k=>[k, t[k][i]])));
      };

      setTickets(toRows(tTickets));
      setCategories(toRows(tCats));
      setCommentaires(toRows(tComments));
    } catch(e) {
      showToast('err', 'Erreur de chargement');
    }
  };

  useEffect(() => {
    grist.ready({requiredAccess:'full'});
    grist.onRecords(async records => {
      if (!records || !records.length) { setLoading(false); return; }
      const profil = records[0];
      setMoi(profil);
      await charger(profil);
      setLoading(false);
    });
  }, []);

  if (loading) return (
    <div className="app">
      <div className="hdr"><div className="hdr-left"><div className="hdr-title">TICKETING</div></div></div>
      <div className="loading"><span className="blink">chargement...</span></div>
    </div>
  );

  if (!moi) return (
    <div className="app">
      <div className="hdr"><div className="hdr-left"><div className="hdr-title">TICKETING</div></div></div>
      <div className="empty">Utilisateur non identifié.</div>
    </div>
  );

  const estAdmin = !!moi.admin_ticketing;
  const mesCatsIds = categories.filter(c =>
    c.responsable_id === moi.id || (Array.isArray(c.agents) && c.agents.includes(moi.id))
  ).map(c=>c.id);
  const estAgent = mesCatsIds.length > 0;

  // Filtrage tickets
  const ticketsFiltres = tickets.filter(t => {
    const vueOk = onglet === 'mes-tickets'
      ? t.demandeur_id === moi.id
      : onglet === 'tous'
      ? (estAdmin || mesCatsIds.includes(t.categorie_id))
      : true;
    const statutOk = !filtreStatut || t.statut === filtreStatut;
    const critOk = !filtreCrit || t.criticite === filtreCrit;
    const rechOk = !recherche || (t.titre||'').toLowerCase().includes(recherche.toLowerCase());
    return vueOk && statutOk && critOk && rechOk;
  }).sort((a,b)=>(b.date_creation||0)-(a.date_creation||0));

  const creerTicket = async ({titre, description, criticite, categorie_id}) => {
    try {
      const cat = categories.find(c=>c.id===categorie_id);
      const now = Math.floor(Date.now()/1000);
      await grist.docApi.applyUserActions([['AddRecord', 'Tck_Tickets', null, {
        titre,
        description,
        criticite,
        statut: 'OUVERT',
        categorie_id,
        demandeur_id: moi.id,
        agent_assigne_id: cat?.responsable_id || null,
        date_creation: now,
        date_maj: now,
      }]]);
      await charger(moi);
      setModale(null);
      showToast('ok', 'Ticket créé');
    } catch(e) {
      showToast('err', 'Erreur lors de la création');
    }
  };

  const mettreAJourTicket = async (id, updates) => {
    try {
      updates.date_maj = Math.floor(Date.now()/1000);
      await grist.docApi.applyUserActions([['UpdateRecord', 'Tck_Tickets', id, updates]]);
      await charger(moi);
      showToast('ok', 'Ticket mis à jour');
    } catch(e) {
      showToast('err', 'Erreur lors de la mise à jour');
    }
  };

  const ajouterCommentaire = async (ticket_id, contenu) => {
    try {
      await grist.docApi.applyUserActions([['AddRecord', 'Tck_Commentaires', null, {
        ticket_id,
        auteur_id: moi.id,
        contenu,
        date: Math.floor(Date.now()/1000),
      }]]);
      await charger(moi);
      showToast('ok', 'Commentaire ajouté');
    } catch(e) {
      showToast('err', 'Erreur lors de l\'ajout');
    }
  };

  return (
    <div className="app">
      {/* Header */}
      <div className="hdr">
        <div className="hdr-left">
          <div className="hdr-title">TICKETING</div>
          <div className="hdr-name">{moi.nom_complet || moi.email}</div>
        </div>
        <div className="hdr-right">
          <button className="btn btn-primary btn-sm" onClick={()=>setModale('nouveau')}>+ Nouveau</button>
        </div>
      </div>

      {/* Onglets */}
      <div style={{background:'#fff',borderBottom:'2px solid #E5E7EB',display:'flex',flexShrink:0}}>
        <button className={`tab ${onglet==='mes-tickets'?'active':''}`} onClick={()=>setOnglet('mes-tickets')}>Mes tickets</button>
        {(estAgent||estAdmin) && <button className={`tab ${onglet==='tous'?'active':''}`} onClick={()=>setOnglet('tous')}>File support</button>}
        {estAdmin && <button className={`tab ${onglet==='admin'?'active':''}`} onClick={()=>setOnglet('admin')}>Admin</button>}
      </div>

      {/* Filtres */}
      {onglet !== 'admin' && (
        <div className="filters">
          <input className="search-input" placeholder="Rechercher..." value={recherche} onChange={e=>setRecherche(e.target.value)}/>
          <select className="filter-sel" value={filtreStatut} onChange={e=>setFiltreStatut(e.target.value)}>
            <option value="">Tous statuts</option>
            {STATUTS.map(s=><option key={s} value={s}>{STATUT_LABELS[s]}</option>)}
          </select>
          <select className="filter-sel" value={filtreCrit} onChange={e=>setFiltreCrit(e.target.value)}>
            <option value="">Toutes criticités</option>
            {CRITICITES.map(c=><option key={c} value={c}>{CRITICITE_LABELS[c]}</option>)}
          </select>
        </div>
      )}

      {/* Corps */}
      {onglet === 'admin' ? (
        <VueAdmin categories={categories}/>
      ) : (
        <div className="body">
          {ticketsFiltres.length === 0 && (
            <div className="empty">Aucun ticket{recherche||filtreStatut||filtreCrit ? ' pour ces filtres' : ''}.</div>
          )}
          {ticketsFiltres.map(t=>{
            const cat = categories.find(c=>c.id===t.categorie_id);
            return (
              <div key={t.id} className="ticket-item" onClick={()=>setModale({ticket:t})}>
                <div className="ticket-item-left">
                  <div className="ticket-titre">{t.titre}</div>
                  <div className="ticket-meta">
                    <span>#{t.id}</span>
                    {cat && <span>{cat.nom}</span>}
                    <span>{fmt(t.date_creation)}</span>
                  </div>
                </div>
                <div className="ticket-item-right">
                  <BadgeCrit c={t.criticite}/>
                  <BadgeStatut s={t.statut}/>
                  <span className="chevron">›</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Modales */}
      {modale === 'nouveau' && (
        <ModaleNouveauTicket
          categories={categories}
          onClose={()=>setModale(null)}
          onCreate={creerTicket}
        />
      )}
      {modale?.ticket && (
        <ModaleDetail
          ticket={modale.ticket}
          categories={categories}
          moi={moi}
          estAgent={estAgent}
          estAdmin={estAdmin}
          commentaires={commentaires}
          onClose={()=>setModale(null)}
          onUpdate={mettreAJourTicket}
          onComment={ajouterCommentaire}
        />
      )}

      <Toast toast={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
