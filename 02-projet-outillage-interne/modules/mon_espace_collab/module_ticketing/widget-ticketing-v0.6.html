<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet"/>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#F4F5F7;height:100vh;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}
.hdr{background:#fff;border-bottom:1px solid #E5E7EB;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-title{font-family:'Press Start 2P';font-size:9px;color:#43D19B;letter-spacing:.05em;}
.hdr-name{font-size:12px;color:#6B7280;margin-top:2px;}
.sec-tabs{background:#fff;border-bottom:2px solid #E5E7EB;display:flex;flex-shrink:0;}
.sec-tab{padding:9px 14px;font-size:12px;font-weight:500;color:#6B7280;border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;margin-bottom:-2px;}
.sec-tab.active{color:#43D19B;border-bottom-color:#43D19B;}
.filters{background:#fff;border-bottom:1px solid #E5E7EB;padding:8px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.search-input{border:1px solid #E5E7EB;border-radius:6px;padding:5px 10px;font-size:12px;font-family:'Inter';flex:1;min-width:140px;}
.search-input:focus{outline:none;border-color:#43D19B;}
.filter-sel{border:1px solid #E5E7EB;border-radius:6px;padding:5px 8px;font-size:12px;font-family:'Inter';background:#fff;color:#1A1A1A;}
.filter-sel:focus{outline:none;border-color:#43D19B;}
.body{flex:1;overflow-y:auto;padding:14px 16px;}
.btn{padding:7px 14px;border-radius:4px;font-family:'Press Start 2P';font-size:8px;cursor:pointer;border:2px solid #000;box-shadow:3px 3px 0 #000;transition:all .08s;background:#fff;color:#1A1A1A;}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}
.btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}
.btn-primary{background:#43D19B;color:#fff;}
.btn-danger{background:#EF4444;color:#fff;}
.btn-sm{padding:5px 10px;font-size:7px;}
.ticket-item{background:#fff;border:1px solid #E5E7EB;border-radius:6px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.ticket-item:hover{border-color:#43D19B;}
.ticket-item-left{flex:1;min-width:0;}
.ticket-id{font-size:10px;font-weight:600;color:#9CA3AF;margin-bottom:2px;}
.ticket-titre{font-size:13px;font-weight:500;color:#1A1A1A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ticket-meta{font-size:11px;color:#6B7280;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;}
.ticket-item-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.chevron{color:#43D19B;font-size:16px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;}
.badge-basse{background:#F3F4F6;color:#6B7280;}
.badge-moyenne{background:#DBEAFE;color:#1E3A8A;}
.badge-haute{background:#FEF3C7;color:#92400E;}
.badge-tres_haute{background:#FEE2E2;color:#991B1B;}
.empty{text-align:center;padding:40px;color:#9CA3AF;font-size:13px;}
.loading{font-family:'Press Start 2P';font-size:10px;color:#6B7280;padding:60px;text-align:center;}
.blink{animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.toast{position:fixed;bottom:16px;right:16px;padding:9px 14px;border-radius:6px;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.toast-ok{background:#43D19B;color:#fff;}
.toast-err{background:#EF4444;color:#fff;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#fff;border-radius:8px;width:100%;max-width:600px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal-hdr{padding:14px 18px;border-bottom:1px solid #E5E7EB;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;}
.modal-title{font-family:'Press Start 2P';font-size:8px;color:#43D19B;margin-bottom:4px;}
.modal-subtitle{font-size:12px;color:#1A1A1A;font-weight:500;}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#6B7280;line-height:1;padding:2px;flex-shrink:0;}
.modal-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:18px;}
.modal-footer{padding:12px 18px;border-top:1px solid #E5E7EB;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}
.field-label{font-size:11px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.field-input{width:100%;border:1px solid #D1D5DB;border-radius:6px;padding:8px 10px;font-family:'Inter';font-size:12px;}
.field-input:focus{outline:none;border-color:#43D19B;}
.field-select{width:100%;border:1px solid #D1D5DB;border-radius:6px;padding:8px 10px;font-family:'Inter';font-size:12px;background:#fff;}
.field-select:focus{outline:none;border-color:#43D19B;}
textarea.field-input{resize:vertical;min-height:88px;line-height:1.5;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.detail-block{background:#F9FAFB;border:1px solid #F3F4F6;border-radius:6px;padding:10px 12px;}
.detail-label{font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.detail-value{font-size:12px;color:#1A1A1A;}
.detail-desc{font-size:12px;color:#1A1A1A;line-height:1.6;white-space:pre-wrap;}
.statut-selector{display:flex;flex-wrap:wrap;gap:6px;}
.statut-btn{padding:5px 12px;border-radius:999px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .1s;font-family:'Inter';}
.statut-btn.current{border-style:solid;box-shadow:2px 2px 0 rgba(0,0,0,.15);}
.statut-btn:disabled{opacity:.4;cursor:not-allowed;}
.comment-item{border:1px solid #F3F4F6;border-radius:6px;padding:12px 14px;background:#FAFAFA;}
.comment-meta{font-size:11px;color:#9CA3AF;margin-bottom:5px;display:flex;gap:8px;align-items:center;}
.comment-auteur{font-weight:600;color:#6B7280;}
.comment-contenu{font-size:12px;color:#1A1A1A;line-height:1.5;}
.comments-list{display:flex;flex-direction:column;gap:8px;}
/* PJ */
.pj-zone{border:1px solid #F3F4F6;border-radius:6px;padding:10px 12px;background:#FAFAFA;}
.pj-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.pj-item{display:flex;align-items:center;gap:8px;font-size:12px;}
.pj-item-name{flex:1;color:#1A1A1A;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pj-item-link{color:#43D19B;text-decoration:none;font-size:11px;font-weight:500;flex-shrink:0;}
.pj-item-link:hover{text-decoration:underline;}
.pj-item-del{background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:13px;flex-shrink:0;line-height:1;}
.pj-item-del:hover{color:#EF4444;}
.pj-add{display:flex;align-items:center;gap:8px;}
.pj-add-label{font-size:11px;color:#6B7280;border:1px dashed #D1D5DB;border-radius:6px;padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.pj-add-label:hover{border-color:#43D19B;color:#43D19B;}
.pj-add-label.disabled{opacity:.4;cursor:not-allowed;}
.pj-quota{font-size:10px;color:#9CA3AF;}
.encart{background:#F0FDF9;border:1px solid #A7F3D0;border-radius:6px;padding:12px 14px;font-size:12px;color:#065F46;line-height:1.6;}
.encart-warn{background:#FEF3C7;border:1px solid #FCD34D;border-radius:6px;padding:12px 14px;font-size:12px;color:#92400E;line-height:1.6;}
.sep{border:none;border-top:1px solid #E5E7EB;}
.admin-card{background:#fff;border:1px solid #E5E7EB;border-radius:6px;padding:12px 14px;margin-bottom:8px;}
.admin-card-title{font-size:13px;font-weight:500;color:#1A1A1A;margin-bottom:4px;}
.admin-card-meta{font-size:11px;color:#6B7280;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Config Xano ──
const XANO_BASE = "XXX";
const WIDGET_TOKEN = "XXX";
const xanoAuth = () => ({ "Authorization": `Bearer ${WIDGET_TOKEN}` });

// ── Limites PJ ──
const PJ_MAX_COUNT = 5;
const PJ_MAX_BYTES = 10 * 1024 * 1024; // 10MB

// ── Constantes ──
const STATUTS = ['OUVERT','EN_COURS','PENDING','RESOLU','A_VALIDER','FERME'];
const STATUT_LABELS = {OUVERT:'Ouvert',EN_COURS:'En cours',PENDING:'Pending',RESOLU:'Résolu',A_VALIDER:'À valider',FERME:'Fermé'};
const CRITICITES = ['BASSE','MOYENNE','HAUTE','TRES_HAUTE'];
const CRITICITE_LABELS = {BASSE:'Basse',MOYENNE:'Moyenne',HAUTE:'Haute',TRES_HAUTE:'Très haute'};
const STATUT_COLORS = {
  OUVERT:    {bg:'#F3F4F6',color:'#6B7280'},
  EN_COURS:  {bg:'#EDE9FE',color:'#4C1D95'},
  PENDING:   {bg:'#FEF3C7',color:'#92400E'},
  RESOLU:    {bg:'#DBEAFE',color:'#1E3A8A'},
  A_VALIDER: {bg:'#FEF3C7',color:'#92400E'},
  FERME:     {bg:'#D1FAE5',color:'#065F46'},
};

const fmt = (ts) => {
  if (!ts) return '—';
  return new Date(ts * 1000).toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
};

const derefVal = (v) => {
  if (v === null || v === undefined) return null;
  if (Array.isArray(v)) {
    if (v[0] === 'R') return v[1] ?? null;  // Ref -> entier
    if (v[0] === 'L') return v.slice(1);    // RefList -> tableau d'entiers
    return v;
  }
  return v;
};

const toRows = (t) => {
  if (!t) return [];
  const keys = Object.keys(t);
  if (!keys.length) return [];
  const len = t[keys[0]]?.length || 0;
  return Array.from({length: len}, (_, i) =>
    Object.fromEntries(keys.map(k => [k, derefVal(t[k][i])]))
  );
};

const BadgeStatut = ({s}) => {
  const c = STATUT_COLORS[s] || {bg:'#F3F4F6',color:'#6B7280'};
  return <span className="badge" style={{background:c.bg,color:c.color}}>{STATUT_LABELS[s]||s}</span>;
};
const BadgeCrit = ({c}) => (
  <span className={`badge badge-${(c||'').toLowerCase()}`}>{CRITICITE_LABELS[c]||c}</span>
);

function Toast({toast}) {
  if (!toast) return null;
  return <div className={`toast toast-${toast.type}`}>{toast.msg}</div>;
}

// ── Xano PJ API ──
const xanoUpload = async (file) => {
  const fd = new FormData();
  fd.append('fichier', file);
  fd.append('nom_fichier', file.name);
  const r = await fetch(`${XANO_BASE}/TICKETING/pj_upload`, {
    method: 'POST',
    headers: xanoAuth(),
    body: fd,
  });
  if (!r.ok) throw new Error('Erreur upload');
  return await r.json(); // {xano_pj_id, nom_fichier, size}
};

const xanoSignedUrl = async (xano_pj_id) => {
  const r = await fetch(`${XANO_BASE}/TICKETING/pj_signed_url?xano_pj_id=${encodeURIComponent(xano_pj_id)}`, {
    headers: xanoAuth(),
  });
  if (!r.ok) throw new Error('Erreur signed URL');
  const data = await r.json();
  return data.url;
};

const xanoDelete = async (xano_pj_id) => {
  const r = await fetch(`${XANO_BASE}/TICKETING/pj_delete`, {
    method: 'DELETE',
    headers: { ...xanoAuth(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ xano_pj_id }),
  });
  if (!r.ok) throw new Error('Erreur suppression');
};

// ── Composant SectionPJ ──
// pjsGrist : lignes Tck_PiecesJointes déjà filtrées pour ce contexte
function SectionPJ({ pjsGrist, totalPjsTicket, auteurId, ticketId, commentaireId, showToast, onReload }) {
  const [loadingUrl, setLoadingUrl] = useState({}); // {grist_id: bool}
  const [uploading, setUploading] = useState(false);
  const inputRef = useRef();

  const countActuel = totalPjsTicket; // toutes PJ du ticket confondues
  const quotaAtteint = countActuel >= PJ_MAX_COUNT;

  const handleUpload = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;

    // Contrôle nombre
    if (countActuel + files.length > PJ_MAX_COUNT) {
      showToast('err', `Max ${PJ_MAX_COUNT} pièces jointes par ticket (${countActuel} existante(s))`);
      if (inputRef.current) inputRef.current.value = '';
      return;
    }

    // Contrôle taille cumulée (fichiers en cours + existants estimés)
    const tailleNouvelle = files.reduce((s, f) => s + f.size, 0);
    const tailleExistante = pjsGrist.reduce((s, p) => s + (p.size || 0), 0);
    if (tailleExistante + tailleNouvelle > PJ_MAX_BYTES) {
      showToast('err', `Limite de 10 MB cumulés dépassée`);
      if (inputRef.current) inputRef.current.value = '';
      return;
    }

    setUploading(true);
    try {
      const results = await Promise.all(files.map(f => xanoUpload(f)));
      const now = Math.floor(Date.now() / 1000);
      await Promise.all(results.map(res =>
        grist.docApi.applyUserActions([['AddRecord', 'Tck_PiecesJointes', null, {
          xano_pj_id: res.xano_pj_id,
          nom_fichier: res.nom_fichier,
          ticket_id: ticketId || null,
          commentaire_id: commentaireId || null,
          auteur_id: auteurId,
          date: now,
        }]])
      ));
      await onReload();
      showToast('ok', `${files.length} fichier(s) joint(s)`);
    } catch(e) {
      showToast('err', "Erreur lors de l'upload");
    } finally {
      setUploading(false);
      if (inputRef.current) inputRef.current.value = '';
    }
  };

  const handleOpen = async (pj) => {
    setLoadingUrl(prev => ({...prev, [pj.id]: true}));
    try {
      const url = await xanoSignedUrl(pj.xano_pj_id);
      window.open(url, '_blank');
    } catch(e) {
      showToast('err', 'Erreur ouverture fichier');
    } finally {
      setLoadingUrl(prev => ({...prev, [pj.id]: false}));
    }
  };

  const handleDownload = async (pj) => {
  setLoadingUrl(prev => ({...prev, [`dl_${pj.id}`]: true}));
  try {
    const url = await xanoSignedUrl(pj.xano_pj_id);
    const resp = await fetch(url);
    if (!resp.ok) throw new Error();
    const blob = await resp.blob();
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = pj.nom_fichier;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(blobUrl);
  } catch(e) {
    showToast('err', 'Erreur téléchargement');
  } finally {
    setLoadingUrl(prev => ({...prev, [`dl_${pj.id}`]: false}));
  }
};

  const handleDelete = async (pj) => {
    try {
      await xanoDelete(pj.xano_pj_id);
      await grist.docApi.applyUserActions([['RemoveRecord', 'Tck_PiecesJointes', pj.id]]);
      await onReload();
      showToast('ok', 'Pièce jointe supprimée');
    } catch(e) {
      showToast('err', 'Erreur suppression');
    }
  };

  return (
    <div className="pj-zone">
      {pjsGrist.length > 0 && (
        <div className="pj-list">
          {pjsGrist.map(pj => (
            <div key={pj.id} className="pj-item">
              <span>📎</span>
              <span className="pj-item-name">{pj.nom_fichier}</span>
              <button
                className="pj-item-link"
                style={{background:'none',border:'none',cursor:'pointer',color:'#43D19B',fontSize:11,fontWeight:500}}
                onClick={() => handleOpen(pj)}
                disabled={loadingUrl[pj.id]}
              >
                {loadingUrl[pj.id] ? '...' : '👁️ Ouvrir'}
              </button>
              <button
                className="pj-item-link"
                style={{background:'none',border:'none',cursor:'pointer',color:'#6B7280',fontSize:11,fontWeight:500}}
                onClick={() => handleDownload(pj)}
                disabled={loadingUrl[`dl_${pj.id}`]}
              >
                {loadingUrl[`dl_${pj.id}`] ? '...' : '⬇️ Télécharger'}
              </button>
              <button className="pj-item-del" onClick={() => handleDelete(pj)} title="Supprimer">✕</button>
            </div>
          ))}
        </div>
      )}
      <div className="pj-add">
        <label className={`pj-add-label${quotaAtteint || uploading ? ' disabled' : ''}`}>
          {uploading ? 'Upload...' : `+ Joindre`}
          <input
            ref={inputRef}
            type="file"
            multiple
            style={{display:'none'}}
            onChange={handleUpload}
            disabled={quotaAtteint || uploading}
          />
        </label>
        <span className="pj-quota">{countActuel}/{PJ_MAX_COUNT} fichiers</span>
      </div>
    </div>
  );
}

// ── Modale Nouveau Ticket ──
function ModaleNouveauTicket({categories, onClose, onCreate}) {
  const [titre, setTitre] = useState('');
  const [desc, setDesc] = useState('');
  const [crit, setCrit] = useState('MOYENNE');
  const [catId, setCatId] = useState(categories.filter(c=>c.actif)[0]?.id || '');
  const [saving, setSaving] = useState(false);
  const [pendingFiles, setPendingFiles] = useState([]);
  const inputRef = useRef();

  const handleFiles = (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    setPendingFiles(prev => {
      const merged = [...prev, ...files];
      if (merged.length > PJ_MAX_COUNT) {
        return prev; // silencieux — le quota est affiché visuellement
      }
      const tailleTotal = merged.reduce((s, f) => s + f.size, 0);
      if (tailleTotal > PJ_MAX_BYTES) {
        return prev;
      }
      return merged;
    });
    if (inputRef.current) inputRef.current.value = '';
  };

  const removeFile = (idx) => setPendingFiles(prev => prev.filter((_, i) => i !== idx));

  const submit = async () => {
    if (!titre.trim() || !catId) return;
    setSaving(true);
    await onCreate({titre: titre.trim(), description: desc.trim(), criticite: crit, categorie_id: Number(catId), pendingFiles});
    setSaving(false);
  };

  const quotaAtteint = pendingFiles.length >= PJ_MAX_COUNT;

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-hdr">
          <div><div className="modal-title">NOUVEAU TICKET</div></div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div>
            <div className="field-label">Titre *</div>
            <input className="field-input" value={titre} onChange={e=>setTitre(e.target.value)} placeholder="Décrivez brièvement votre demande"/>
          </div>
          <div>
            <div className="field-label">Description</div>
            <textarea className="field-input" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Détails supplémentaires..."/>
          </div>
          <div className="field-row">
            <div>
              <div className="field-label">Catégorie *</div>
              <select className="field-select" value={catId} onChange={e=>setCatId(e.target.value)}>
                {categories.filter(c=>c.actif).map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
              </select>
            </div>
            <div>
              <div className="field-label">Criticité</div>
              <select className="field-select" value={crit} onChange={e=>setCrit(e.target.value)}>
                {CRITICITES.map(c=><option key={c} value={c}>{CRITICITE_LABELS[c]}</option>)}
              </select>
            </div>
          </div>
          <div>
            <div className="field-label">Pièces jointes</div>
            <div className="pj-zone">
              {pendingFiles.length > 0 && (
                <div className="pj-list">
                  {pendingFiles.map((f, i) => (
                    <div key={i} className="pj-item">
                      <span>📎</span>
                      <span className="pj-item-name">{f.name}</span>
                      <span style={{fontSize:10,color:'#9CA3AF',flexShrink:0}}>{(f.size/1024).toFixed(0)} Ko</span>
                      <button className="pj-item-del" onClick={() => removeFile(i)} title="Retirer">✕</button>
                    </div>
                  ))}
                </div>
              )}
              <div className="pj-add">
                <label className={`pj-add-label${quotaAtteint || saving ? ' disabled' : ''}`}>
                  + Joindre
                  <input
                    ref={inputRef}
                    type="file"
                    multiple
                    style={{display:'none'}}
                    onChange={handleFiles}
                    disabled={quotaAtteint || saving}
                  />
                </label>
                <span className="pj-quota">{pendingFiles.length}/{PJ_MAX_COUNT} fichiers</span>
              </div>
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-sm" onClick={onClose} disabled={saving}>Annuler</button>
          <button className="btn btn-primary btn-sm" onClick={submit} disabled={saving||!titre.trim()||!catId}>
            {saving ? (pendingFiles.length ? 'Upload...' : 'Création...') : 'Créer le ticket'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Modale Détail Ticket ──
function ModaleDetail({ticket, categories, collaborateurs, piecesJointes, moi, estAgent, estAdmin, commentaires, showToast, onClose, onUpdate, onComment, onReload}) {
  const [newComment, setNewComment] = useState('');
  const [saving, setSaving] = useState(false);
  const [commenting, setCommenting] = useState(false);
  const [catId, setCatId] = useState(ticket.categorie_id || '');

  const estDemandeur = moi.user_id === ticket.demandeur_id;
  const cat = categories.find(c => c.id === ticket.categorie_id);
  const estResponsable = cat && cat.responsable_id === moi.user_id;
  const peutModifierStatut = estAgent || estAdmin;
  const peutReaffecter = estResponsable || estAdmin;

  const nomCollab = (id) => {
    if (!id) return '—';
    const c = collaborateurs.find(c => c.id === id);
    return c?.nom_complet || c?.email || String(id);
  };

  const ticketComments = commentaires
    .filter(c => c.ticket_id === ticket.id)
    .sort((a, b) => (b.date||0) - (a.date||0));

  // PJ du ticket (pas des commentaires)
  const pjsTicket = piecesJointes.filter(p => p.ticket_id === ticket.id && !p.commentaire_id);
  // PJ de tous les commentaires de ce ticket (pour le quota cumulé)
  const pjsCommentaires = piecesJointes.filter(p => p.ticket_id === ticket.id && p.commentaire_id);
  const totalPjsTicket = pjsTicket.length + pjsCommentaires.length;

  const changeStatut = async (s) => {
    setSaving(true);
    await onUpdate(ticket.id, {statut: s});
    setSaving(false);
    onClose();
  };

  const saveReaffectation = async () => {
    if (!catId || Number(catId) === ticket.categorie_id) return;
    setSaving(true);
    const newCat = categories.find(c => c.id === Number(catId));
    await onUpdate(ticket.id, {
      categorie_id: Number(catId),
      agent_assigne_id: newCat?.responsable_id || null,
    });
    setSaving(false);
    onClose();
  };

  const submitComment = async () => {
    if (!newComment.trim()) return;
    setCommenting(true);
    await onComment(ticket.id, newComment.trim());
    setNewComment('');
    setCommenting(false);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-hdr">
          <div style={{flex:1,minWidth:0}}>
            <div className="modal-title">TICKET</div>
            <div className="modal-subtitle" style={{marginTop:4}}>{ticket.id} — {ticket.titre}</div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        <div className="modal-body">

          {/* Statut + criticité */}
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
            <BadgeStatut s={ticket.statut}/>
            <BadgeCrit c={ticket.criticite}/>
          </div>

          {/* Description */}
          {ticket.description && (
            <div>
              <div className="field-label">Description</div>
              <div className="detail-desc">{ticket.description}</div>
            </div>
          )}

          {/* Métadonnées */}
          <div className="detail-grid">
            <div className="detail-block">
              <div className="detail-label">Catégorie</div>
              <div className="detail-value">{cat?.nom||'—'}</div>
            </div>
            <div className="detail-block">
              <div className="detail-label">Agent assigné</div>
              <div className="detail-value">{nomCollab(ticket.agent_assigne_id)}</div>
            </div>
            <div className="detail-block">
              <div className="detail-label">Demandeur</div>
              <div className="detail-value">{nomCollab(ticket.demandeur_id)}</div>
            </div>
            <div className="detail-block">
              <div className="detail-label">Créé le</div>
              <div className="detail-value">{fmt(ticket.date_creation)}</div>
            </div>
          </div>

          {/* PJ ticket */}
          <div>
            <div className="field-label" style={{marginBottom:8}}>Pièces jointes</div>
            <SectionPJ
              pjsGrist={pjsTicket}
              totalPjsTicket={totalPjsTicket}
              auteurId={moi.user_id}
              ticketId={ticket.id}
              commentaireId={null}
              showToast={showToast}
              onReload={onReload}
            />
          </div>

          <hr className="sep"/>

          {/* Action demandeur : À VALIDER */}
          {estDemandeur && ticket.statut === 'A_VALIDER' && (
            <div className="encart">
              Ce ticket est marqué comme résolu. Confirmez-vous ?
              <div style={{display:'flex',gap:8,marginTop:10}}>
                <button className="btn btn-primary btn-sm" disabled={saving} onClick={()=>changeStatut('FERME')}>✓ Confirmer — Fermer</button>
                <button className="btn btn-sm" disabled={saving} onClick={()=>changeStatut('EN_COURS')}>↺ Rouvrir</button>
              </div>
            </div>
          )}

          {/* Changement statut */}
          {peutModifierStatut && (
            <div>
              <div className="field-label">Statut</div>
              <div className="statut-selector">
                {STATUTS.map(s => {
                  const c = STATUT_COLORS[s] || {};
                  const isCurrent = s === ticket.statut;
                  return (
                    <button
                      key={s}
                      className={`statut-btn${isCurrent?' current':''}`}
                      style={{background:c.bg, color:c.color, borderColor: isCurrent ? c.color : 'transparent'}}
                      disabled={saving || isCurrent}
                      onClick={() => changeStatut(s)}
                    >
                      {isCurrent && '● '}{STATUT_LABELS[s]}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Réaffectation */}
          {peutReaffecter && (
            <div>
              <div className="field-label">Réaffecter à une catégorie</div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <select className="field-select" value={catId} onChange={e=>setCatId(Number(e.target.value))}>
                  {categories.filter(c=>c.actif).map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
                </select>
                <button className="btn btn-sm" style={{whiteSpace:'nowrap'}}
                  disabled={saving || Number(catId)===ticket.categorie_id}
                  onClick={saveReaffectation}>
                  Réaffecter
                </button>
              </div>
            </div>
          )}

          <hr className="sep"/>

          {/* Commentaires */}
          <div>
            <div className="field-label">Commentaires ({ticketComments.length})</div>

            {ticketComments.length > 0 && (
              <div className="comments-list" style={{marginBottom:14}}>
                {ticketComments.map(c => {
                  const pjsComment = piecesJointes.filter(p => p.commentaire_id === c.id);
                  return (
                    <div key={c.id} className="comment-item">
                      <div className="comment-meta">
                        <span className="comment-auteur">{nomCollab(c.auteur_id)}</span>
                        <span>{fmt(c.date)}</span>
                      </div>
                      <div className="comment-contenu">{c.contenu}</div>
                      {/* PJ commentaire */}
                      <div style={{marginTop:10}}>
                        <SectionPJ
                          pjsGrist={pjsComment}
                          totalPjsTicket={totalPjsTicket}
                          auteurId={moi.user_id}
                          ticketId={null}
                          commentaireId={c.id}
                          showToast={showToast}
                          onReload={onReload}
                        />
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Nouveau commentaire */}
            <textarea
              className="field-input"
              style={{minHeight:72}}
              value={newComment}
              onChange={e=>setNewComment(e.target.value)}
              placeholder="Ajouter un commentaire..."
            />
            <div style={{display:'flex',justifyContent:'flex-end',marginTop:8}}>
              <button className="btn btn-primary btn-sm" disabled={commenting||!newComment.trim()} onClick={submitComment}>
                {commenting ? '...' : 'Envoyer'}
              </button>
            </div>
          </div>

        </div>

        <div className="modal-footer">
          <button className="btn btn-sm" onClick={onClose}>Fermer</button>
        </div>
      </div>
    </div>
  );
}

// ── Vue Admin ──
function VueAdmin({categories}) {
  return (
    <div className="body">
      <div className="encart" style={{marginBottom:14}}>
        La configuration des catégories et agents se gère directement dans la table <strong>Tck_Categories</strong> dans Grist.
      </div>
      {categories.map(c => (
        <div key={c.id} className="admin-card">
          <div className="admin-card-title">
            {c.nom}
            {!c.actif && <span style={{marginLeft:8,fontSize:10,color:'#EF4444',fontWeight:600}}>● Inactive</span>}
          </div>
          <div className="admin-card-meta">Responsable ID : {c.responsable_id||'—'}</div>
        </div>
      ))}
    </div>
  );
}

// ── App ──
function App() {
  const [moi, setMoi] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tickets, setTickets] = useState([]);
  const [categories, setCategories] = useState([]);
  const [commentaires, setCommentaires] = useState([]);
  const [collaborateurs, setCollaborateurs] = useState([]);
  const [piecesJointes, setPiecesJointes] = useState([]);
  const [toast, setToast] = useState(null);
  const [modale, setModale] = useState(null);
  const [onglet, setOnglet] = useState('mes-tickets');
  const [filtreStatut, setFiltreStatut] = useState('');
  const [filtreCrit, setFiltreCrit] = useState('');
  const [recherche, setRecherche] = useState('');
  const toastTimer = useRef(null);

  const showToast = (type, msg) => {
    setToast({type, msg});
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 3000);
  };

  const charger = async () => {
    try {
      const [tTickets, tCats, tComments, tCollabs, tPJ] = await Promise.all([
        grist.docApi.fetchTable('Tck_Tickets'),
        grist.docApi.fetchTable('Tck_Categories'),
        grist.docApi.fetchTable('Tck_Commentaires'),
        grist.docApi.fetchTable('Collaborateurs'),
        grist.docApi.fetchTable('Tck_PiecesJointes'),
      ]);
      setTickets(toRows(tTickets));
      setCategories(toRows(tCats));
      setCommentaires(toRows(tComments));
      setCollaborateurs(toRows(tCollabs));
      setPiecesJointes(toRows(tPJ));
    } catch(e) {
      showToast('err', 'Erreur de chargement');
    }
  };

  useEffect(() => {
    grist.ready({requiredAccess: 'full'});
    grist.onRecords(async records => {
      if (!records || !records.length) { setLoading(false); return; }
      const profil = records[0];
      setMoi(profil);
      await charger();
      setLoading(false);
    });
  }, []);

  if (loading) return (
    <div className="app">
      <div className="hdr"><div><div className="hdr-title">TICKETING</div></div></div>
      <div className="loading"><span className="blink">chargement...</span></div>
    </div>
  );

  if (!moi) return (
    <div className="app">
      <div className="hdr"><div><div className="hdr-title">TICKETING</div></div></div>
      <div className="empty">Utilisateur non identifié.</div>
    </div>
  );

  const estAdmin = !!moi.admin_ticketing;
  const mesCatsIds = categories.filter(c =>
    c.responsable_id === moi.user_id ||
    (Array.isArray(c.agents) && c.agents.includes(moi.user_id))
  ).map(c => c.id);
  const estAgent = mesCatsIds.length > 0;

  const ticketsFiltres = tickets.filter(t => {
    const vueOk = onglet === 'mes-tickets'
      ? t.demandeur_id === moi.user_id
      : estAdmin ? true : mesCatsIds.includes(t.categorie_id);
    const statutOk = !filtreStatut || t.statut === filtreStatut;
    const critOk = !filtreCrit || t.criticite === filtreCrit;
    const rechOk = !recherche
      || (t.titre||'').toLowerCase().includes(recherche.toLowerCase())
      || String(t.id||'').toLowerCase().includes(recherche.toLowerCase());
    return vueOk && statutOk && critOk && rechOk;
  }).sort((a,b) => (b.date_creation||0) - (a.date_creation||0));

  const creerTicket = async ({titre, description, criticite, categorie_id, pendingFiles}) => {
    try {
      const cat = categories.find(c => c.id === categorie_id);
      const now = Math.floor(Date.now()/1000);

      // Étape 1 : upload PJ vers Xano (avant création du ticket — si échec, rien n'est créé)
      let uploadResults = [];
      if (pendingFiles?.length) {
        uploadResults = await Promise.all(pendingFiles.map(f => xanoUpload(f)));
      }

      // Étape 2 : création du ticket
      const result = await grist.docApi.applyUserActions([['AddRecord', 'Tck_Tickets', null, {
        titre, description, criticite,
        statut: 'OUVERT',
        categorie_id,
        demandeur_id: moi.user_id,
        agent_assigne_id: cat?.responsable_id || null,
        date_creation: now,
        date_maj: now,
      }]]);
      const newTicketId = result.retValues[0];

      // Étape 3 : enregistrement des PJ dans Grist
      if (uploadResults.length) {
        await Promise.all(uploadResults.map(res =>
          grist.docApi.applyUserActions([['AddRecord', 'Tck_PiecesJointes', null, {
            xano_pj_id: res.xano_pj_id,
            nom_fichier: res.nom_fichier,
            ticket_id: newTicketId,
            commentaire_id: null,
            auteur_id: moi.user_id,
            date: now,
          }]])
        ));
      }

      await charger();
      setModale(null);
      showToast('ok', 'Ticket créé');
    } catch(e) {
      showToast('err', 'Erreur lors de la création');
    }
  };

  const mettreAJourTicket = async (id, updates) => {
    try {
      updates.date_maj = Math.floor(Date.now()/1000);
      await grist.docApi.applyUserActions([['UpdateRecord', 'Tck_Tickets', id, updates]]);
      await charger();
      showToast('ok', 'Ticket mis à jour');
    } catch(e) {
      showToast('err', 'Erreur lors de la mise à jour');
    }
  };

  const ajouterCommentaire = async (ticket_id, contenu) => {
    try {
      await grist.docApi.applyUserActions([['AddRecord', 'Tck_Commentaires', null, {
        ticket_id,
        auteur_id: moi.user_id,
        contenu,
        date: Math.floor(Date.now()/1000),
      }]]);
      await charger();
      showToast('ok', 'Commentaire ajouté');
    } catch(e) {
      showToast('err', "Erreur lors de l'ajout du commentaire");
    }
  };

  return (
    <div className="app">
      <div className="hdr">
        <div>
          <div className="hdr-title">TICKETING</div>
          <div className="hdr-name">{moi.nom_complet || moi.email}</div>
        </div>
        <button className="btn btn-primary btn-sm" onClick={()=>setModale('nouveau')}>+ Nouveau</button>
      </div>

      <div className="sec-tabs">
        <button className={`sec-tab${onglet==='mes-tickets'?' active':''}`} onClick={()=>setOnglet('mes-tickets')}>Mes tickets</button>
        {(estAgent||estAdmin) && (
          <button className={`sec-tab${onglet==='agent'?' active':''}`} onClick={()=>setOnglet('agent')}>Vue agent</button>
        )}
        {estAdmin && (
          <button className={`sec-tab${onglet==='admin'?' active':''}`} onClick={()=>setOnglet('admin')}>Admin</button>
        )}
      </div>

      {onglet !== 'admin' && (
        <div className="filters">
          <input
            className="search-input"
            placeholder="Rechercher (titre, SUPP-X)..."
            value={recherche}
            onChange={e=>setRecherche(e.target.value)}
          />
          <select className="filter-sel" value={filtreStatut} onChange={e=>setFiltreStatut(e.target.value)}>
            <option value="">Tous statuts</option>
            {STATUTS.map(s=><option key={s} value={s}>{STATUT_LABELS[s]}</option>)}
          </select>
          <select className="filter-sel" value={filtreCrit} onChange={e=>setFiltreCrit(e.target.value)}>
            <option value="">Toutes criticités</option>
            {CRITICITES.map(c=><option key={c} value={c}>{CRITICITE_LABELS[c]}</option>)}
          </select>
        </div>
      )}

      {onglet === 'admin' ? (
        <VueAdmin categories={categories}/>
      ) : (
        <div className="body">
          {ticketsFiltres.length === 0 && (
            <div className="empty">
              {recherche||filtreStatut||filtreCrit ? 'Aucun ticket pour ces filtres.' : 'Aucun ticket.'}
            </div>
          )}
          {ticketsFiltres.map(t => {
            const cat = categories.find(c => c.id === t.categorie_id);
            return (
              <div key={t.id} className="ticket-item" onClick={()=>setModale({ticket:t})}>
                <div className="ticket-item-left">
                  <div className="ticket-id">{t.id}</div>
                  <div className="ticket-titre">{t.titre}</div>
                  <div className="ticket-meta">
                    {cat && <span>{cat.nom}</span>}
                    <span>{fmt(t.date_creation)}</span>
                  </div>
                </div>
                <div className="ticket-item-right">
                  <BadgeCrit c={t.criticite}/>
                  <BadgeStatut s={t.statut}/>
                  <span className="chevron">›</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {modale === 'nouveau' && (
        <ModaleNouveauTicket
          categories={categories}
          onClose={()=>setModale(null)}
          onCreate={creerTicket}
        />
      )}
      {modale?.ticket && (
        <ModaleDetail
          ticket={modale.ticket}
          categories={categories}
          collaborateurs={collaborateurs}
          piecesJointes={piecesJointes}
          moi={moi}
          estAgent={estAgent}
          estAdmin={estAdmin}
          commentaires={commentaires}
          showToast={showToast}
          onClose={()=>setModale(null)}
          onUpdate={mettreAJourTicket}
          onComment={ajouterCommentaire}
          onReload={charger}
        />
      )}

      <Toast toast={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
