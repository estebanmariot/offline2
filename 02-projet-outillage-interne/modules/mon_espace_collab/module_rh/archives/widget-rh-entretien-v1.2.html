<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Module RH</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:#F4F5F7;color:#1A1A1A;font-size:13px;height:100vh;overflow:hidden;}
    .app{display:flex;flex-direction:column;height:100vh;}

    /* Header */
    .hdr{background:#fff;border-bottom:1px solid #E5E7EB;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .hdr-title{font-family:'Press Start 2P',monospace;font-size:9px;color:#43D19B;letter-spacing:.05em;}
    .hdr-name{font-size:12px;color:#6B7280;margin-top:2px;}
    .nav-tabs{display:flex;border:1px solid #E5E7EB;border-radius:6px;overflow:hidden;}
    .nav-tab{padding:5px 14px;font-size:12px;cursor:pointer;color:#6B7280;background:#fff;transition:all .1s;}
    .nav-tab.active{background:#43D19B;color:#fff;font-weight:500;}

    /* Sélecteur collab (manager) */
    .collab-sel{background:#fff;border-bottom:1px solid #E5E7EB;padding:8px 16px;flex-shrink:0;}
    .collab-sel select{width:100%;border:1px solid #E5E7EB;border-radius:6px;padding:6px 10px;font-size:12px;font-family:'Inter',sans-serif;background:#fff;color:#1A1A1A;}

    /* Corps scrollable */
    .body{flex:1;overflow-y:auto;padding:14px 16px;}

    /* Cards */
    .card{background:#fff;border:1px solid #E5E7EB;border-radius:8px;margin-bottom:10px;}
    .card-hdr{padding:10px 14px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;}
    .card-hdr-title{font-size:11px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;}
    .card-body{padding:10px 14px;}

    /* Entretien item */
    .ent-item{border:1px solid #E5E7EB;border-radius:6px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s;}
    .ent-item:hover{border-color:#43D19B;}
    .ent-item:last-child{margin-bottom:0;}
    .ent-item-name{font-size:13px;font-weight:500;}
    .ent-item-sub{font-size:11px;color:#6B7280;margin-top:2px;}
    .ent-chevron{font-size:18px;color:#43D19B;}

    /* Objectif item */
    .obj-item{border:1px solid #E5E7EB;border-radius:6px;margin-bottom:8px;overflow:hidden;}
    .obj-item:last-child{margin-bottom:0;}
    .obj-item-hdr{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
    .obj-item-hdr:hover{background:#F9FAFB;}
    .obj-item-left{flex:1;}
    .obj-item-title{font-size:13px;font-weight:500;}
    .obj-item-meta{display:flex;align-items:center;gap:8px;margin-top:4px;}
    .obj-progress{flex:1;max-width:80px;height:3px;background:#E5E7EB;border-radius:2px;overflow:hidden;}
    .obj-progress-bar{height:100%;border-radius:2px;transition:width .3s;}
    .obj-pct{font-size:11px;color:#6B7280;}
    .obj-detail{padding:0 12px 12px;border-top:1px solid #E5E7EB;background:#FAFAFA;}

    /* Critères */
    .critere{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;border-bottom:1px solid #F3F4F6;}
    .critere:last-child{border-bottom:none;}
    .critere-seuil{margin-left:auto;color:#6B7280;font-size:11px;}

    /* Badges */
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;}
    .badge-realisable{background:#D1FAE5;color:#065F46;}
    .badge-arisque{background:#FEF3C7;color:#92400E;}
    .badge-plan{background:#F3F4F6;color:#6B7280;}
    .badge-enprep{background:#DBEAFE;color:#1E3A8A;}
    .badge-soumis{background:#FEF3C7;color:#92400E;}
    .badge-enprepman{background:#EDE9FE;color:#4C1D95;}
    .badge-publie{background:#D1FAE5;color:#065F46;}
    .badge-valide{background:#D1FAE5;color:#065F46;}
    .tag-annee{background:#F3F4F6;color:#6B7280;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500;}

    /* Formulaire entretien */
    .form-hdr{background:#fff;border-bottom:1px solid #E5E7EB;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .form-back{font-size:20px;color:#43D19B;cursor:pointer;line-height:1;}
    .form-title{font-size:13px;font-weight:500;flex:1;}
    .form-sub{font-size:11px;color:#6B7280;}
    .sections-tabs{background:#fff;border-bottom:2px solid #E5E7EB;padding:0 16px;display:flex;overflow-x:auto;flex-shrink:0;}
    .sec-tab{padding:9px 14px;font-size:12px;font-weight:500;color:#6B7280;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;}
    .sec-tab.active{color:#43D19B;border-bottom-color:#43D19B;}
    .q-block{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:14px;margin-bottom:12px;}
    .q-label{font-weight:600;margin-bottom:10px;}
    .q-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .q-col-hdr{font-size:10px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;}
    textarea{width:100%;border:1px solid #D1D5DB;border-radius:6px;padding:7px 9px;font-family:'Inter',sans-serif;font-size:12px;resize:vertical;min-height:72px;}
    textarea:focus{outline:none;border-color:#43D19B;}
    textarea:disabled{background:#F9FAFB;color:#9CA3AF;}
    .stars{display:flex;gap:3px;align-items:center;}
    .star{font-size:20px;cursor:pointer;color:#D1D5DB;transition:color .1s;line-height:1;}
    .star.on{color:#43D19B;}
    .star.dis{cursor:default;}
    .manager-placeholder{color:#D1D5DB;font-size:12px;padding:8px 0;}
    .btn-copy{font-size:10px;padding:2px 7px;border:1px solid #D1D5DB;border-radius:4px;background:#fff;cursor:pointer;color:#6B7280;}
    .btn-copy:hover{border-color:#43D19B;color:#43D19B;}

    /* Footer formulaire */
    .form-footer{background:#fff;border-top:1px solid #E5E7EB;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
    .footer-nav{display:flex;gap:6px;}

    /* Boutons */
    .btn{padding:7px 14px;border-radius:4px;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;border:2px solid #000;box-shadow:3px 3px 0 #000;transition:all .08s;background:#fff;color:#1A1A1A;}
    .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}
    .btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}
    .btn-primary{background:#43D19B;color:#fff;}
    .btn-sm{padding:5px 10px;font-size:7px;}

    /* Toast */
    .toast{position:fixed;bottom:16px;right:16px;padding:9px 14px;border-radius:6px;font-size:12px;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);}
    .toast-ok{background:#43D19B;color:#fff;}
    .toast-err{background:#EF4444;color:#fff;}

    /* Instructions section */
    .sec-inst{background:#F0FDF9;border:1px solid #A7F3D0;border-radius:6px;padding:9px 12px;font-size:12px;color:#065F46;margin-bottom:12px;}

    /* Loading */
    .loading{font-family:'Press Start 2P',monospace;font-size:10px;color:#6B7280;padding:60px;text-align:center;}
    .blink{animation:blink 1s step-end infinite;}
    @keyframes blink{50%{opacity:0;}}

    /* Section objectifs dans formulaire */
    .obj-periode{margin-bottom:16px;}
    .obj-periode-title{font-size:11px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
    .obj-form-item{border:1px solid #E5E7EB;border-radius:6px;margin-bottom:8px;overflow:hidden;}
    .obj-form-hdr{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
    .obj-form-body{padding:10px 12px;border-top:1px solid #F3F4F6;background:#FAFAFA;}
    .obj-add-btn{border:1px dashed #D1D5DB;border-radius:6px;padding:8px;text-align:center;font-size:12px;color:#6B7280;cursor:pointer;margin-top:8px;}
    .obj-add-btn:hover{border-color:#43D19B;color:#43D19B;}

    /* Onglet objectifs */
    .obj-year-sel{display:flex;gap:6px;margin-bottom:12px;}
    .year-btn{padding:4px 10px;font-size:12px;border:1px solid #E5E7EB;border-radius:999px;cursor:pointer;background:#fff;color:#6B7280;}
    .year-btn.active{background:#43D19B;color:#fff;border-color:#43D19B;}

    .empty{text-align:center;padding:40px;color:#9CA3AF;font-size:13px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const T_ENTRETIENS = 'Rh_Entretiens';
const T_CAMPAGNES  = 'Rh_Campagnes';
const T_SECTIONS   = 'Rh_Sections';
const T_QUESTIONS  = 'Rh_Questions';
const T_REPONSES   = 'Rh_Reponses';
const T_OBJECTIFS  = 'Rh_Objectifs';
const T_CRITERES   = 'Rh_Criteres';

const STATUT_LABELS = {
  PLANIFIE:'Planifié', EN_PREP_COLLAB:'En préparation',
  EN_PREP_MANAGER:'En cours (manager)',
  PUBLIE:'Publié', VALIDE:'Validé ✓'
};
const STATUT_CLASS = {
  PLANIFIE:'badge-plan', EN_PREP_COLLAB:'badge-enprep',
  EN_PREP_MANAGER:'badge-enprepman',
  PUBLIE:'badge-publie', VALIDE:'badge-valide'
};

const toRows = t => {
  const ids = t.id || [];
  return ids.map((id,i) => {
    const r = {id};
    Object.keys(t).forEach(k => { if(k!=='id') r[k]=t[k][i]; });
    return r;
  });
};

const anneeEnCours = new Date().getFullYear();

// ── Stars ─────────────────────────────────────────────────────
function Stars({value, max, onChange, disabled}){
  const [hover, setHover] = useState(0);
  return (
    <div className="stars">
      {Array.from({length:max||5},(_,i)=>i+1).map(n=>(
        <span key={n}
          className={`star${n<=(hover||value)?` on`:''}${disabled?' dis':''}`}
          onClick={()=>!disabled&&onChange(n===value?0:n)}
          onMouseEnter={()=>!disabled&&setHover(n)}
          onMouseLeave={()=>!disabled&&setHover(0)}
        >★</span>
      ))}
      {value>0&&<span style={{fontSize:11,color:'#6B7280',marginLeft:4}}>({value}/{max||5})</span>}
    </div>
  );
}

// calcul plancher % depuis criteres coches
const calcPlancher = (crs, champ) => {
  const coches = crs.filter(c=>c[champ]);
  if(!coches.length) return 0;
  return Math.max(...coches.map(c=>c.seuil_pct||0));
};

function SectionObjectifs({campagne, collabSel, objectifs, setObjectifs, criteres, setCriteres, roleEntretien, entretien, showToast, moiEmail, moiAdminRh}){
  const [ouverts, setOuverts] = useState({});
  const periodes = [
    {key:'N-1', label:'Bilan N-1',     annee:campagne?.annee-1, avancement:true},
    {key:'N',   label:'Suivi N',       annee:campagne?.annee,   avancement:true},
    {key:'N+1', label:'Objectifs N+1', annee:campagne?.annee+1, avancement:false},
  ];
  const modeAutonome    = !entretien;
  const readonlyCollab  = modeAutonome ? roleEntretien!=='collaborateur' : (roleEntretien!=='collaborateur'||entretien?.statut!=='EN_PREP_COLLAB');
  const readonlyManager = modeAutonome ? roleEntretien!=='manager'       : (roleEntretien!=='manager'||entretien?.statut!=='EN_PREP_MANAGER');
  const toutReadonly    = !modeAutonome&&(['VALIDE','PUBLIE'].includes(entretien?.statut)||['lecteur','admin_rh'].includes(roleEntretien));
  const objsDePeriode = (annee) => objectifs.filter(o=>o.collaborateur_id===collabSel&&o.annee===annee);
  const crsDobj = (objId) => criteres.filter(c=>c.objectif_id===objId).sort((a,b)=>a.ordre-b.ordre);
  const updateObj = (id,champs) => setObjectifs(prev=>prev.map(o=>o.id===id?{...o,...champs}:o));
  const updateCr  = (id,champs) => setCriteres(prev=>prev.map(c=>c.id===id?{...c,...champs}:c));

  // Vérifie si l'utilisateur connecté peut éditer/supprimer cet objectif
  const peutEditer = (o) => moiAdminRh || (o.acl_editors||'').split(',').filter(Boolean).includes(moiEmail);

  const supprimerObj = async (o) => {
    if(!window.confirm(`Supprimer l'objectif "${o.titre}" et tous ses critères ?`)) return;
    try {
      const crsLies = criteres.filter(c=>c.objectif_id===o.id);
      const actions = [
        ...crsLies.map(c=>['RemoveRecord','Rh_Criteres',c.id]),
        ['RemoveRecord','Rh_Objectifs',o.id],
      ];
      await grist.docApi.applyUserActions(actions);
      setCriteres(prev=>prev.filter(c=>c.objectif_id!==o.id));
      setObjectifs(prev=>prev.filter(ob=>ob.id!==o.id));
      showToast('ok','Objectif supprimé');
    } catch(e){ showToast('err','Erreur suppression : '+e.message); }
  };

  const supprimerCr = async (c) => {
    if(!window.confirm(`Supprimer le critère "${c.libelle}" ?`)) return;
    try {
      await grist.docApi.applyUserActions([['RemoveRecord','Rh_Criteres',c.id]]);
      setCriteres(prev=>prev.filter(cr=>cr.id!==c.id));
      showToast('ok','Critère supprimé');
    } catch(e){ showToast('err','Erreur suppression : '+e.message); }
  };

  const sauvObj = async (o) => {
    try { await grist.docApi.applyUserActions([['UpdateRecord','Rh_Objectifs',o.id,{
      titre:o.titre||'', statut:o.statut||'realisable',
      pct_avancement_collab:Number(o.pct_avancement_collab)||0,
      pct_avancement_manager:Number(o.pct_avancement_manager)||0,
      commentaire_collab:o.commentaire_collab||'',
      commentaire_manager:o.commentaire_manager||'',
    }]]); } catch(e){ showToast('err','Err obj: '+e.message); }
  };
  const sauvCr = async (c) => {
    try { await grist.docApi.applyUserActions([['UpdateRecord','Rh_Criteres',c.id,{
      libelle:c.libelle||'', seuil_pct:Number(c.seuil_pct)||0,
      atteint_collab:!!c.atteint_collab, atteint_manager:!!c.atteint_manager,
    }]]); } catch(e){ showToast('err','Err cr: '+e.message); }
  };
  const ajouterObj = async (annee) => {
    try {
      const res = await grist.docApi.applyUserActions([['AddRecord','Rh_Objectifs',null,{
        collaborateur_id:collabSel, annee, titre:'Nouvel objectif', statut:'realisable',
        pct_avancement_collab:0, pct_avancement_manager:0, ordre:objsDePeriode(annee).length+1,
      }]]);
      const newId = res.retValues?.[0];
      if(newId){ setObjectifs(prev=>[...prev,{id:newId,collaborateur_id:collabSel,annee,titre:'Nouvel objectif',statut:'realisable',pct_avancement_collab:0,pct_avancement_manager:0,commentaire_collab:'',commentaire_manager:'',ordre:0}]); setOuverts(p=>({...p,[newId]:true})); }
    } catch(e){ showToast('err','Err ajout obj: '+e.message); }
  };
  const ajouterCr = async (objId) => {
    try {
      const res = await grist.docApi.applyUserActions([['AddRecord','Rh_Criteres',null,{
        objectif_id:objId, libelle:'Nouveau critere', seuil_pct:100,
        atteint_collab:false, atteint_manager:false, ordre:crsDobj(objId).length+1,
      }]]);
      const newId = res.retValues?.[0];
      if(newId) setCriteres(prev=>[...prev,{id:newId,objectif_id:objId,libelle:'Nouveau critere',seuil_pct:100,atteint_collab:false,atteint_manager:false,ordre:0}]);
    } catch(e){ showToast('err','Err ajout cr: '+e.message); }
  };
  const cocherCr = async (cr, champ) => {
    const nv = !cr[champ];
    const crMaj = {...cr,[champ]:nv};
    updateCr(cr.id,{[champ]:nv});
    await sauvCr(crMaj);
    const crsMAJ = criteres.map(c=>c.id===cr.id?crMaj:c).filter(c=>c.objectif_id===cr.objectif_id);
    const champPct = champ==='atteint_collab'?'pct_avancement_collab':'pct_avancement_manager';
    const obj = objectifs.find(o=>o.id===cr.objectif_id);
    if(!obj) return;
    const pl = calcPlancher(crsMAJ,champ);
    if(pl>Number(obj[champPct]||0)){
      updateObj(obj.id,{[champPct]:pl});
      await grist.docApi.applyUserActions([['UpdateRecord','Rh_Objectifs',obj.id,{[champPct]:pl}]]);
    }
  };

  return (
    <div>
      {periodes.map(({key,label,annee,avancement})=>{
        const objs = objsDePeriode(annee);
        const peutAjouter = !toutReadonly;
        return (
          <div key={key} className="obj-periode">
            <div className="obj-periode-title"><span>{label}</span><span className="tag-annee">{annee}</span></div>
            {objs.map(o=>{
              const crs=crsDobj(o.id), ouvert=ouverts[o.id];
              const plC=calcPlancher(crs,'atteint_collab'), plM=calcPlancher(crs,'atteint_manager');
              return (
                <div key={o.id} className="obj-form-item">
                  <div className="obj-form-hdr" onClick={()=>setOuverts(p=>({...p,[o.id]:!p[o.id]}))}>
                    <div style={{flex:1}}>
                      {!toutReadonly&&!readonlyCollab
                        ? <input style={{border:'none',background:'transparent',fontWeight:500,fontSize:13,width:'100%',fontFamily:'Inter,sans-serif'}}
                            value={o.titre||''} onClick={e=>e.stopPropagation()}
                            onChange={e=>updateObj(o.id,{titre:e.target.value})} onBlur={()=>sauvObj(o)}/>
                        : <div style={{fontWeight:500}}>{o.titre}</div>}
                      {avancement&&<div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
                        <div className="obj-progress" style={{maxWidth:80}}><div className="obj-progress-bar" style={{width:`${o.pct_avancement_collab||0}%`,background:(o.pct_avancement_collab||0)>=75?'#43D19B':'#F59E0B'}}/></div>
                        <span className="obj-pct">{o.pct_avancement_collab||0}%</span>
                      </div>}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      {!toutReadonly&&(!readonlyCollab||!readonlyManager)&&(
                        <select value={o.statut||'realisable'} onClick={e=>e.stopPropagation()}
                          onChange={e=>updateObj(o.id,{statut:e.target.value})} onBlur={()=>sauvObj(o)}
                          style={{fontSize:10,padding:'2px 4px',border:'1px solid #E5E7EB',borderRadius:4,background:'#fff'}}>
                          <option value="realisable">Realisable</option>
                          <option value="a_risque">A risque</option>
                        </select>)}
                      {peutEditer(o)&&<span onClick={e=>{e.stopPropagation();supprimerObj(o);}} title="Supprimer l'objectif" style={{color:'#EF4444',cursor:'pointer',fontSize:14,lineHeight:1,padding:'0 2px'}}>✕</span>}
                      <span style={{color:'#9CA3AF',fontSize:12}}>{ouvert?'▲':'▼'}</span>
                    </div>
                  </div>
                  {ouvert&&(
                    <div className="obj-form-body">
                      <div style={{marginBottom:10}}>
                        <div style={{fontSize:10,fontWeight:600,color:'#6B7280',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>Criteres <span style={{fontWeight:400,fontSize:9}}>vert=collab violet=manager</span></div>
                        {crs.map(c=>(
                          <div key={c.id} style={{display:'grid',gridTemplateColumns:`1fr 56px 28px 28px${peutEditer(o)?' 20px':''}`,gap:6,alignItems:'center',marginBottom:6}}>
                            {!toutReadonly&&(!readonlyCollab||!readonlyManager)
                              ? <input style={{border:'1px solid #E5E7EB',borderRadius:4,padding:'4px 6px',fontSize:12,fontFamily:'Inter,sans-serif'}}
                                  value={c.libelle||''} onChange={e=>updateCr(c.id,{libelle:e.target.value})} onBlur={()=>sauvCr(c)}/>
                              : <span style={{fontSize:12}}>{c.libelle}</span>}
                            {!toutReadonly&&(!readonlyCollab||!readonlyManager)
                              ? <input type="number" min="0" max="100"
                                  style={{border:'1px solid #E5E7EB',borderRadius:4,padding:'4px 6px',fontSize:12,fontFamily:'Inter,sans-serif',textAlign:'center'}}
                                  value={c.seuil_pct||0} onChange={e=>updateCr(c.id,{seuil_pct:Number(e.target.value)})} onBlur={()=>sauvCr(c)}/>
                              : <span style={{fontSize:11,color:'#6B7280',textAlign:'center'}}>{c.seuil_pct}%</span>}
                            <span style={{fontSize:18,cursor:readonlyCollab?'default':'pointer',color:c.atteint_collab?'#43D19B':'#D1D5DB',textAlign:'center'}}
                              onClick={()=>!readonlyCollab&&cocherCr(c,'atteint_collab')} title="Collab">{c.atteint_collab?'✓':'○'}</span>
                            <span style={{fontSize:18,cursor:readonlyManager?'default':'pointer',color:c.atteint_manager?'#8B5CF6':'#D1D5DB',textAlign:'center'}}
                              onClick={()=>!readonlyManager&&cocherCr(c,'atteint_manager')} title="Manager">{c.atteint_manager?'✓':'○'}</span>
                            {peutEditer(o)&&<span onClick={()=>supprimerCr(c)} title="Supprimer le critère" style={{color:'#EF4444',cursor:'pointer',fontSize:12,textAlign:'center'}}>✕</span>}
                          </div>
                        ))}
                        {peutAjouter&&<div className="obj-add-btn" onClick={()=>ajouterCr(o.id)}>+ Critere</div>}
                      </div>
                      {avancement&&(
                        <div style={{marginBottom:10}}>
                          <div style={{fontSize:10,fontWeight:600,color:'#6B7280',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>% avancement</div>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                            <div>
                              <div style={{fontSize:10,color:'#6B7280',marginBottom:3}}>Collab{plC>0?` (min ${plC}%)`:''}</div>
                              <input type="number" min="0" max="100" disabled={readonlyCollab}
                                style={{width:'100%',border:'1px solid #E5E7EB',borderRadius:4,padding:'5px 8px',fontSize:12,fontFamily:'Inter,sans-serif'}}
                                value={o.pct_avancement_collab||0}
                                onChange={e=>updateObj(o.id,{pct_avancement_collab:Math.max(Number(e.target.value)||0,plC)})}
                                onBlur={()=>sauvObj(o)}/>
                            </div>
                            <div>
                              <div style={{fontSize:10,color:'#6B7280',marginBottom:3,display:'flex',justifyContent:'space-between'}}>
                                <span>Manager{plM>0?` (min ${plM}%)`:''}</span>
                                {!readonlyManager&&<button className="btn-copy" onClick={()=>{const v=o.pct_avancement_collab||0;updateObj(o.id,{pct_avancement_manager:v});sauvObj({...o,pct_avancement_manager:v});}}>copier</button>}
                              </div>
                              <input type="number" min="0" max="100" disabled={readonlyManager}
                                style={{width:'100%',border:'1px solid #E5E7EB',borderRadius:4,padding:'5px 8px',fontSize:12,fontFamily:'Inter,sans-serif'}}
                                value={o.pct_avancement_manager||0}
                                onChange={e=>updateObj(o.id,{pct_avancement_manager:Math.max(Number(e.target.value)||0,plM)})}
                                onBlur={()=>sauvObj(o)}/>
                            </div>
                          </div>
                        </div>
                      )}
                      <div>
                        <div style={{fontSize:10,fontWeight:600,color:'#6B7280',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>Commentaires</div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                          <div>
                            <div style={{fontSize:10,color:'#6B7280',marginBottom:3}}>Collab</div>
                            <textarea value={o.commentaire_collab||''} disabled={readonlyCollab}
                              onChange={e=>updateObj(o.id,{commentaire_collab:e.target.value})} onBlur={()=>sauvObj(o)}
                              style={{minHeight:56}} placeholder={readonlyCollab?'--':'Commentaire...'}/>
                          </div>
                          <div>
                            <div style={{fontSize:10,color:'#6B7280',marginBottom:3,display:'flex',justifyContent:'space-between'}}>
                              <span>Manager</span>
                              {!readonlyManager&&<button className="btn-copy" onClick={()=>{const v=o.commentaire_collab||'';updateObj(o.id,{commentaire_manager:v});sauvObj({...o,commentaire_manager:v});}}>copier</button>}
                            </div>
                            {entretien?.statut==='EN_PREP_COLLAB'
                              ? <div style={{color:'#D1D5DB',fontSize:12,padding:'8px 0'}}>Apres soumission</div>
                              : <textarea value={o.commentaire_manager||''} disabled={readonlyManager}
                                  onChange={e=>updateObj(o.id,{commentaire_manager:e.target.value})} onBlur={()=>sauvObj(o)}
                                  style={{minHeight:56}} placeholder={readonlyManager?'--':'Commentaire manager...'}/>}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
            {objs.length===0&&<div style={{color:'#9CA3AF',fontSize:12,padding:'6px 0'}}>Aucun objectif</div>}
            {peutAjouter&&<div className="obj-add-btn" onClick={()=>ajouterObj(annee)}>+ Objectif {key}</div>}
          </div>
        );
      })}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App(){
  const [moi,         setMoi]         = useState(null);
  const [estManager,  setEstManager]  = useState(false);
  const [collabSel,   setCollabSel]   = useState(null); // id collab affiché (soi ou direct)
  const [collabs,     setCollabs]     = useState([]);   // directs du manager + soi
  const [entretiens,  setEntretiens]  = useState([]);
  const [campagnes,   setCampagnes]   = useState([]);
  const [sections,    setSections]    = useState([]);
  const [questions,   setQuestions]   = useState([]);
  const [reponses,    setReponses]    = useState({});
  const [repIds,      setRepIds]      = useState({});
  const [objectifs,   setObjectifs]   = useState([]);
  const [criteres,    setCriteres]    = useState([]);
  const [onglet,      setOnglet]      = useState('entretiens'); // 'entretiens' | 'objectifs'
  const [ecran,       setEcran]       = useState('liste');      // 'liste' | 'formulaire'
  const [entretienId, setEntretienId] = useState(null);
  const [secIdx,      setSecIdx]      = useState(0);
  const [objOuverts,  setObjOuverts]  = useState({});
  const [annee,       setAnnee]       = useState(anneeEnCours);
  const [loading,     setLoading]     = useState(true);
  const [saving,      setSaving]      = useState(false);
  const [toast,       setToast]       = useState(null);
  const toastT = useRef(null);

  const showToast = useCallback((type,msg)=>{
    setToast({type,msg});
    if(toastT.current) clearTimeout(toastT.current);
    toastT.current = setTimeout(()=>setToast(null),3000);
  },[]);

  // ── Init ──
  useEffect(()=>{
    grist.ready({requiredAccess:'full'});
    grist.onRecords(async records=>{
      if(!records||!records.length){ setLoading(false); return; }
      const profil = records[0];
      setMoi(profil);
      // collabSel sera mis à jour dans charger() avec le vrai ID Collaborateurs
      await charger(profil);
      setLoading(false);
    });
  },[]);

  // ── Chargement global ──
  const charger = async (profil) => {
    try {
      const [tE,tC,tS,tQ,tR,tO,tCr,tCo] = await Promise.all([
        grist.docApi.fetchTable(T_ENTRETIENS),
        grist.docApi.fetchTable(T_CAMPAGNES),
        grist.docApi.fetchTable(T_SECTIONS),
        grist.docApi.fetchTable(T_QUESTIONS),
        grist.docApi.fetchTable(T_REPONSES),
        grist.docApi.fetchTable(T_OBJECTIFS),
        grist.docApi.fetchTable(T_CRITERES),
        grist.docApi.fetchTable('Collaborateurs'),
      ]);
      const rowsE  = toRows(tE);
      const rowsO  = toRows(tO);
      const rowsCo = toRows(tCo);

      // Trouver le vrai ID Collaborateurs depuis l'email
      const moiCollab = rowsCo.find(c => c.email === profil.email);
      const moiId = moiCollab?.id || null;

      // Mettre à jour moi avec le vrai ID et nom_complet
      if(moiCollab){
        setMoi(prev => ({...prev, id: moiId, nom_complet: moiCollab.nom_complet || profil.nom_complet, admin_rh: !!moiCollab.admin_rh}));
        setCollabSel(moiId);
      }

      setEntretiens(rowsE);
      setCampagnes(toRows(tC));
      setSections(toRows(tS));
      setQuestions(toRows(tQ));
      setObjectifs(rowsO);
      setCriteres(toRows(tCr));

      // Construire liste collabs (soi + directs si manager)
      const directIds = [...new Set(
        rowsE.filter(e=>e.manager_id===moiId && e.collaborateur_id!==moiId)
             .map(e=>e.collaborateur_id)
      )];
      const estMgr = directIds.length > 0;
      setEstManager(estMgr);

      if(estMgr){
        const listeCollabs = [{id:moiId, nom: moiCollab?.nom_complet || 'Moi', estMoi:true}];
        directIds.forEach(did=>{
          const ent = rowsE.find(e=>e.collaborateur_id===did);
          const nom = ent?.gristHelper_Display3 || rowsCo.find(c=>c.id===did)?.nom_complet || `Collab #${did}`;
          listeCollabs.push({ id: did, nom, estMoi: false });
        });
        setCollabs(listeCollabs);
      }

      buildReponses(toRows(tR), null);
    } catch(e){ showToast('err','Erreur chargement : '+e.message); }
  };

  const buildReponses = (rowsR, eid) => {
    const repMap={}, idsMap={};
    rowsR.filter(r=>eid===null||r.entretien_id===eid).forEach(r=>{
      const base=`${r.entretien_id}_${r.question_id}_${r.auteur}`;
      // Stocker les deux valeurs sous clés distinctes
      if(r.valeur_texte) repMap[`${base}_texte`] = r.valeur_texte;
      if(r.valeur_note)  repMap[`${base}_note`]  = r.valeur_note;
      // Aussi sous clé simple pour compatibilité types mono
      repMap[base] = r.valeur_texte || r.valeur_note;
      idsMap[base] = r.id;
    });
    setReponses(repMap);
    setRepIds(idsMap);
  };

  // ── Données dérivées ──
  const entretiensFiltres = entretiens.filter(e=>
    collabSel===moi?.id ? e.collaborateur_id===moi?.id : e.collaborateur_id===collabSel
  );
  const entretien = entretiens.find(e=>e.id===entretienId)||null;
  const campagne  = campagnes.find(c=>c.id===entretien?.campagne_id)||null;

  // Rôle dans le contexte de l'entretien affiché
  const roleEntretien = !entretien ? null
    : collabSel===moi?.id ? 'collaborateur'
    : entretien.manager_id===moi?.id ? 'manager'
    : 'lecteur';

  const readonlyCollab  = !entretien||roleEntretien!=='collaborateur'||entretien.statut!=='EN_PREP_COLLAB';
  const readonlyManager = !entretien||roleEntretien!=='manager'||entretien.statut!=='EN_PREP_MANAGER';
  const toutReadonly    = !entretien||['VALIDE'].includes(entretien.statut)||roleEntretien==='lecteur';

  const secsFiltrees = sections
    .filter(s=>s.campagne_id===entretien?.campagne_id && s.type==='standard')
    .sort((a,b)=>a.ordre-b.ordre);
  const secActive = secsFiltrees[secIdx]||null;
  const qsSec = questions.filter(q=>q.section_id===secActive?.id).sort((a,b)=>a.ordre-b.ordre);

  // Objectifs filtrés
  const objsFiltres = objectifs.filter(o=>o.collaborateur_id===collabSel);
  const annees = [...new Set(objsFiltres.map(o=>o.annee))].sort();
  const objsAnnee = objsFiltres.filter(o=>o.annee===annee);

  // Objectifs écran d'accueil : tous, triés par année
  const objsAccueil = [...objsFiltres].sort((a,b)=>b.annee-a.annee);

  const getCriteres = (objId) => criteres.filter(c=>c.objectif_id===objId);

  const getR = (entId, qId, auteur, suffix='') => {
    const key = suffix ? `${entId}_${qId}_${auteur}_${suffix}` : `${entId}_${qId}_${auteur}`;
    return reponses[key]??'';
  };

  // ── Ouvrir formulaire ──
  const ouvrirEntretien = async (eid) => {
    setEntretienId(eid);
    setSecIdx(0);
    setEcran('formulaire');
    try {
      const tR = await grist.docApi.fetchTable(T_REPONSES);
      buildReponses(toRows(tR), eid);
    } catch(e){ showToast('err','Erreur réponses'); }
  };

  // ── Sauvegarder réponses ──
  const sauvegarder = async () => {
    if(!entretien||toutReadonly) return;
    setSaving(true);
    try {
      const auteur = roleEntretien;
      const actions = [];
      const qsToutes = questions.filter(q=>secsFiltrees.some(s=>s.id===q.section_id));
      for(const q of qsToutes){
        const types = q.type ? q.type.split('_') : ['texte'];
        const hasTexte = types.includes('texte');
        const hasNote  = types.includes('note');
        const keyBase  = `${entretien.id}_${q.id}_${auteur}`;
        const keyTxt   = hasTexte && hasNote ? `${keyBase}_texte` : keyBase;
        const keyNote  = hasTexte && hasNote ? `${keyBase}_note`  : keyBase;
        // Cohérence : on n'écrit que les valeurs correspondant au type
        const valTxt   = hasTexte ? (reponses[keyTxt]||'') : '';  // forcé vide si type ne comprend pas texte
        const valNote  = hasNote  ? (Number(reponses[keyNote])||0) : 0;  // forcé 0 si type ne comprend pas note
        const existId  = repIds[keyBase];
        if(existId){
          actions.push(['UpdateRecord',T_REPONSES,existId,{valeur_texte:valTxt,valeur_note:valNote}]);
        } else if(valTxt||valNote){
          actions.push(['AddRecord',T_REPONSES,null,{
            entretien_id:entretien.id, question_id:q.id, auteur,
            valeur_texte:valTxt, valeur_note:valNote,
          }]);
        }
      }
      if(actions.length) await grist.docApi.applyUserActions(actions);
      const tR = await grist.docApi.fetchTable(T_REPONSES);
      buildReponses(toRows(tR), entretien.id);
      showToast('ok','Sauvegardé ✓');
    } catch(e){ showToast('err','Erreur : '+e.message); }
    setSaving(false);
  };

  // ── Transition statut ──
  const transition = async (statut) => {
    try {
      const now = new Date().toISOString();
      const f = {statut};
      if(statut==='SOUMIS') f.date_soumission_collab=now;
      if(statut==='PUBLIE') f.date_publication_manager=now;
      if(statut==='VALIDE') f.date_validation_collab=now;
      await grist.docApi.applyUserActions([['UpdateRecord',T_ENTRETIENS,entretien.id,f]]);
      const tE = await grist.docApi.fetchTable(T_ENTRETIENS);
      setEntretiens(toRows(tE));
      showToast('ok',`${STATUT_LABELS[statut]}`);
      if(statut==='VALIDE'||statut==='SOUMIS') setEcran('liste');
    } catch(e){ showToast('err','Erreur : '+e.message); }
  };

  const setRep = (entId, qId, auteur, val, suffix='') => {
    const key = suffix ? `${entId}_${qId}_${auteur}_${suffix}` : `${entId}_${qId}_${auteur}`;
    setReponses(prev=>({...prev,[key]:val}));
  };

  const copier = (qId, types=[]) => {
    const hasTexte = types.includes('texte');
    const hasNote  = types.includes('note');
    const both = hasTexte && hasNote;
    if(hasTexte){ const v=reponses[both?`${entretien.id}_${qId}_collaborateur_texte`:`${entretien.id}_${qId}_collaborateur`]; if(v!==undefined) setRep(entretien.id,qId,'manager',v,both?'texte':''); }
    if(hasNote){  const v=reponses[both?`${entretien.id}_${qId}_collaborateur_note` :`${entretien.id}_${qId}_collaborateur`]; if(v!==undefined) setRep(entretien.id,qId,'manager',v,both?'note':'');  }
  };

  // ── Validation champs requis ──
  const validerRequis = (auteur) => {
    const qsToutes = questions.filter(q=>secsFiltrees.some(s=>s.id===q.section_id));
    const champRequis = auteur==='collaborateur' ? 'requis_collab' : 'requis_manager';
    const manquants = [];
    for(const q of qsToutes){
      if(!q[champRequis]) continue;
      const valTxt = reponses[`${entretien.id}_${q.id}_${auteur}_texte`]||reponses[`${entretien.id}_${q.id}_${auteur}`];
      const valNote = reponses[`${entretien.id}_${q.id}_${auteur}_note`];
      const types = q.type ? q.type.split('_') : ['texte'];
      const txtOk = !types.includes('texte') || (valTxt && valTxt.trim()!=='');
      const noteOk = !types.includes('note') || (valNote && Number(valNote)>0);
      if(!txtOk||!noteOk) manquants.push(q.libelle);
    }
    return manquants;
  };

  // ── Bouton action principal ──
  const boutonAction = () => {
    if(!entretien) return null;
    const {statut}=entretien;
    if(statut==='EN_PREP_COLLAB'&&roleEntretien==='collaborateur')
      return <button className="btn btn-primary btn-sm" onClick={async()=>{
        const manquants = validerRequis('collaborateur');
        if(manquants.length>0){ showToast('err',`Champs requis : ${manquants[0]}${manquants.length>1?` (+${manquants.length-1})`:''}`) ; return; }
        await sauvegarder();
        await transition('EN_PREP_MANAGER');
        setEcran('liste');
      }}>SOUMETTRE →</button>;
    if(statut==='EN_PREP_MANAGER'&&roleEntretien==='manager')
      return <button className="btn btn-primary btn-sm" onClick={async()=>{
        await sauvegarder();
        await transition('PUBLIE');
        setEcran('liste');
      }}>PUBLIER →</button>;
    if(statut==='PUBLIE'&&roleEntretien==='collaborateur')
      return <button className="btn btn-primary btn-sm" onClick={()=>{transition('VALIDE');setEcran('liste');}}>VALIDER ✓</button>;
    return null;
  };

  if(loading) return <div className="loading">CHARGEMENT<span className="blink">▮</span></div>;

  // ══════════════════════════════════════════════════════════════
  // ÉCRAN FORMULAIRE
  // ══════════════════════════════════════════════════════════════
  if(ecran==='formulaire'&&entretien){
    const secObj = sections.find(s=>s.campagne_id===entretien.campagne_id&&s.type==='objectifs');
    const toutesSecsTabs = [
      ...secsFiltrees,
      ...(secObj?[secObj]:[])
    ];
    const secActiveTab = toutesSecsTabs[secIdx]||null;
    const estSecObj = secActiveTab?.type==='objectifs';

    return (
      <div className="app">
        <div className="form-hdr">
          <span className="form-back" onClick={()=>setEcran('liste')}>‹</span>
          <div style={{flex:1}}>
            <div className="form-title">{campagne?.nom||'Entretien'}</div>
            <div className="form-sub">{moi?.nom_complet}</div>
          </div>
          <span className={`badge ${STATUT_CLASS[entretien.statut]||''}`}>{STATUT_LABELS[entretien.statut]||entretien.statut}</span>
        </div>

        <div className="sections-tabs">
          {toutesSecsTabs.map((s,i)=>(
            <div key={s.id} className={`sec-tab${i===secIdx?' active':''}`} onClick={()=>setSecIdx(i)}>{s.titre}</div>
          ))}
        </div>

        <div className="body">
          {secActiveTab?.instructions&&<div className="sec-inst">{secActiveTab.instructions}</div>}

          {!estSecObj && qsSec.map(q=>{
            const types = q.type ? q.type.split('_') : ['texte'];
            const hasTexte = types.includes('texte');
            const hasNote  = types.includes('note');
            const keyTxt = (hasTexte&&hasNote) ? 'texte' : '';
            const keyNote= (hasTexte&&hasNote) ? 'note'  : '';
            return (
            <div key={q.id} className="q-block">
              <div className="q-label">{q.libelle}{q.requis_collab&&<span style={{color:'#EF4444',marginLeft:3}}>*</span>}</div>
              <div className="q-cols">
                <div>
                  <div className="q-col-hdr">Collaborateur</div>
                  {hasTexte&&(q.type==='texte'||q.type==='texte_note')&&(
                    <textarea
                      value={getR(entretien.id,q.id,'collaborateur',keyTxt)}
                      disabled={readonlyCollab}
                      onChange={e=>setRep(entretien.id,q.id,'collaborateur',e.target.value,keyTxt)}
                      placeholder={readonlyCollab?'—':'Votre réponse…'}
                      style={{marginBottom:hasNote?6:0}}
                    />
                  )}
                  {hasNote&&(
                    <Stars
                      value={Number(getR(entretien.id,q.id,'collaborateur',keyNote))||0}
                      max={q.note_max}
                      disabled={readonlyCollab}
                      onChange={v=>setRep(entretien.id,q.id,'collaborateur',v,keyNote)}
                    />
                  )}
                </div>
                <div>
                  <div className="q-col-hdr">
                    Manager
                    {!readonlyManager&&<button className="btn-copy" onClick={()=>copier(q.id,types)}>↙ Copier</button>}
                  </div>
                  {entretien.statut==='EN_PREP_COLLAB'
                    ? <div className="manager-placeholder">Disponible après soumission</div>
                    : <>
                        {hasTexte&&(
                          <textarea
                            value={getR(entretien.id,q.id,'manager',keyTxt)}
                            disabled={readonlyManager}
                            onChange={e=>setRep(entretien.id,q.id,'manager',e.target.value,keyTxt)}
                            placeholder={readonlyManager?'—':'Réponse manager…'}
                            style={{marginBottom:hasNote?6:0}}
                          />
                        )}
                        {hasNote&&(
                          <Stars
                            value={Number(getR(entretien.id,q.id,'manager',keyNote))||0}
                            max={q.note_max}
                            disabled={readonlyManager}
                            onChange={v=>setRep(entretien.id,q.id,'manager',v,keyNote)}
                          />
                        )}
                      </>
                  }
                </div>
              </div>
            </div>
            );
          })}

          {estSecObj&&(
            <SectionObjectifs
              campagne={campagne}
              collabSel={collabSel}
              objectifs={objectifs}
              setObjectifs={setObjectifs}
              criteres={criteres}
              setCriteres={setCriteres}
              roleEntretien={roleEntretien}
              entretien={entretien}
              showToast={showToast}
              moiEmail={moi?.email}
              moiAdminRh={!!moi?.admin_rh}
            />
          )}
        </div>

        <div className="form-footer">
          <div className="footer-nav">
            <button className="btn btn-sm" disabled={secIdx===0} onClick={()=>setSecIdx(i=>i-1)}>‹ PRÉC</button>
            <button className="btn btn-sm" disabled={secIdx>=toutesSecsTabs.length-1} onClick={()=>setSecIdx(i=>i+1)}>SUIV ›</button>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            {!toutReadonly&&<button className="btn btn-sm" onClick={sauvegarder} disabled={saving}>{saving?'…':'SAUV'}</button>}
            {boutonAction()}
          </div>
        </div>

        {toast&&<div className={`toast toast-${toast.type}`}>{toast.msg}</div>}
      </div>
    );
  }

  // ══════════════════════════════════════════════════════════════
  // ÉCRAN LISTE (accueil)
  // ══════════════════════════════════════════════════════════════
  return (
    <div className="app">
      <div className="hdr">
        <div>
          <div className="hdr-title">MODULE RH</div>
          <div className="hdr-name">{moi?.nom_complet||'—'}</div>
        </div>
        <div className="nav-tabs">
          <div className={`nav-tab${onglet==='entretiens'?' active':''}`} onClick={()=>setOnglet('entretiens')}>Entretiens</div>
          <div className={`nav-tab${onglet==='objectifs'?' active':''}`} onClick={()=>setOnglet('objectifs')}>Objectifs</div>
        </div>
      </div>

      {/* Sélecteur collab (manager uniquement) */}
      {estManager&&(
        <div className="collab-sel">
          <select value={collabSel||''} onChange={e=>setCollabSel(Number(e.target.value))}>
            {collabs.map(c=><option key={c.id} value={c.id}>{c.estMoi?`Moi (${c.nom})`:c.nom}</option>)}
          </select>
        </div>
      )}

      <div className="body">

        {/* ── ONGLET ENTRETIENS ── */}
        {onglet==='entretiens'&&(
          <>
            {entretiensFiltres.length===0
              ? <div className="empty">Aucun entretien disponible</div>
              : entretiensFiltres.map(e=>{
                  const c=campagnes.find(c=>c.id===e.campagne_id);
                  return (
                    <div key={e.id} className="ent-item" onClick={()=>ouvrirEntretien(e.id)}>
                      <div>
                        <div className="ent-item-name">{c?.nom||`Entretien #${e.id}`}</div>
                        <div className="ent-item-sub">{c?.statut==='cloturee'?'Campagne clôturée':'Campagne active'}</div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span className={`badge ${STATUT_CLASS[e.statut]||''}`}>{STATUT_LABELS[e.statut]||e.statut}</span>
                        <span className="ent-chevron">›</span>
                      </div>
                    </div>
                  );
                })
            }

            {/* Objectifs en cours sur l'écran accueil */}
            {objsAccueil.length>0&&(
              <div className="card" style={{marginTop:16}}>
                <div className="card-hdr">
                  <span className="card-hdr-title">Objectifs</span>
                </div>
                <div className="card-body" style={{paddingTop:8}}>
                  {objsAccueil.map(o=>{
                    const crs=getCriteres(o.id);
                    const ouvert=objOuverts[o.id];
                    const pct=o.pct_avancement_collab||0;
                    return (
                      <div key={o.id} className="obj-item">
                        <div className="obj-item-hdr" onClick={()=>setObjOuverts(p=>({...p,[o.id]:!p[o.id]}))}>
                          <div className="obj-item-left">
                            <div className="obj-item-title">{o.titre}</div>
                            <div className="obj-item-meta">
                              <span className="tag-annee">{o.annee}</span>
                              <div className="obj-progress"><div className="obj-progress-bar" style={{width:`${pct}%`,background:pct>=75?'#43D19B':'#F59E0B'}}/></div>
                              <span className="obj-pct">{pct}%</span>
                            </div>
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:6}}>
                            <span className={`badge badge-${o.statut==='realisable'?'realisable':'arisque'}`}>{o.statut==='realisable'?'Réalisable':'À risque'}</span>
                            <span style={{color:'#9CA3AF',fontSize:12}}>{ouvert?'▲':'▼'}</span>
                          </div>
                        </div>
                        {ouvert&&(
                          <div className="obj-detail">
                            {crs.length===0&&<div style={{color:'#9CA3AF',fontSize:12,padding:'4px 0'}}>Aucun critère</div>}
                            {crs.map(c=>(
                              <div key={c.id} className="critere">
                                <span style={{color:c.atteint_collab?'#43D19B':'#D1D5DB',fontSize:14}}>{c.atteint_collab?'✓':'○'}</span>
                                <span>{c.libelle}</span>
                                <span className="critere-seuil">{c.seuil_pct}%</span>
                              </div>
                            ))}
                            <div style={{marginTop:8,fontSize:12,display:'flex',gap:12}}>
                              <span style={{color:'#6B7280'}}>Collab : <strong>{pct}%</strong></span>
                              <span style={{color:'#6B7280'}}>Manager : <strong>{o.pct_avancement_manager||0}%</strong></span>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </>
        )}

        {/* ── ONGLET OBJECTIFS ── */}
        {onglet==='objectifs'&&(
          <SectionObjectifs
            campagne={{annee: annee}}
            collabSel={collabSel}
            objectifs={objectifs}
            setObjectifs={setObjectifs}
            criteres={criteres}
            setCriteres={setCriteres}
            roleEntretien={estManager?'manager':'collaborateur'}
            entretien={null}
            showToast={showToast}
            moiEmail={moi?.email}
            moiAdminRh={!!moi?.admin_rh}
          />
        )}
      </div>

      {toast&&<div className={`toast toast-${toast.type}`}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
